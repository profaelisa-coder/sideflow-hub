<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideFlow - ODE Registration</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0d1b2a; --sec: #1b263b; --gold: #ffb703; --blue: #457b9d; --white: #e0e1dd; --red: #e63946; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding: 20px; padding-bottom: 100px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; }
        h2 { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; text-align: center; margin-bottom: 5px; }
        .sub-title { text-align: center; font-size: 0.8rem; opacity: 0.7; margin-bottom: 25px; letter-spacing: 1px; }
        .box { background: var(--sec); padding: 25px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.4); margin-bottom: 25px; border-bottom: 4px solid var(--gold); }
        label { display: block; font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; color: var(--gold); text-transform: uppercase; }
        input, select { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: var(--bg); color: white; font-size: 1rem; margin-bottom: 20px; box-sizing: border-box; }
        select option { background: var(--sec); }
        button { width: 100%; padding: 16px; border-radius: 8px; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .btn-reg { background: var(--gold); color: var(--bg); margin-top: 10px; }
        .btn-reg:hover { background: #ffca3a; transform: translateY(-2px); }
        .live-label { color: var(--gold); font-size: 0.9rem; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .live-dot { width: 8px; height: 8px; background: var(--red); border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .pod-row { background: var(--sec); padding: 15px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--blue); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .pod-info b { color: var(--gold); font-size: 1rem; }
        .pod-count { background: var(--blue); padding: 6px 15px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .nav-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #162a44; padding: 15px; display: flex; justify-content: center; gap: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-footer button { width: auto; padding: 10px 20px; font-size: 0.75rem; background: var(--blue); color: white; }
        .btn-back { background: rgba(255,255,255,0.1) !important; color: white !important; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <h2>STAFF ACCESS</h2>
    <p style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 20px;">ENTER ODE PASSWORD TO CONTINUE</p>
    <input type="password" id="passInput" placeholder="PASSWORD" style="width: 250px; text-align: center;">
    <button onclick="checkLogin()" style="width: 250px;" class="btn-reg">UNLOCK</button>
</div>

<div class="container">
    <h2>TOURNAMENT REGISTRATION ODE</h2>
    <div class="sub-title">ON-DEMAND EVENT MANAGEMENT</div>
    
    <div class="box">
        <label>Player Full Name</label>
        <input type="text" id="playerName" placeholder="EX: ASH KETCHUM" autocomplete="off">
        
        <label>Tournament Pod</label>
        <select id="tourSelect">
            <option value="">LOADING CATALOG...</option>
        </select>
        
        <button class="btn-reg" onclick="registerPlayer()">REGISTER PLAYER</button>
    </div>

    <div class="live-label"><div class="live-dot"></div> LIVE QUEUE STATUS</div>
    <div id="waitingList"></div>
</div>

<div class="nav-footer">
    <button class="btn-back" onclick="backToLead()">⬅ BACK TO LEAD SETUP</button>
    <button onclick="navToTables()">🗺 VIEW TABLE MAP</button>
</div>

<script>
    const supabaseUrl = 'https://hocpoastnlcwgedvcyqs.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvY3BvYXN0bmxjd2dlZHZjeXFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODU0MTYsImV4cCI6MjA4OTg2MTQxNn0.1MvvcFsnGW4e0Bj7mzoUKs_3bGM-eHDJTOqsvgKe-pI';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
    
    const urlParams = new URLSearchParams(window.location.search);
    let eventPrefix = urlParams.get('event') || localStorage.getItem('active_event_id');

    window.onload = () => {
        if(!eventPrefix) { document.body.innerHTML="<h2 style='margin-top:50px'>ERROR: MISSING EVENT ID</h2>"; return; }
        localStorage.setItem('active_event_id', eventPrefix);
        
        if(sessionStorage.getItem('ode_auth') === 'true') {
            document.getElementById('loginOverlay').style.display = 'none';
            loadData();
        }
    };

    function checkLogin() {
        const passInput = document.getElementById('passInput').value.toUpperCase();
        const letters = (eventPrefix || "").slice(0, 3);
        const firstNums = (eventPrefix || "").slice(3, 5);
        const masterODEPas = (letters + firstNums + "ODE").toUpperCase(); 

        if(passInput === masterODEPas) {
            sessionStorage.setItem('ode_auth', 'true');
            location.reload();
        } else {
            alert("ACCESS DENIED.");
        }
    }

    async function loadData() {
        const { data: catalog } = await _supabase.from('tournament_catalog')
            .select('*')
            .eq('event_id', eventPrefix)
            .eq('item_type', 'ODE');

        const select = document.getElementById('tourSelect');
        select.innerHTML = '<option value="">-- SELECT TOURNAMENT --</option>';
        
        if(catalog) {
            catalog.forEach(t => {
                select.innerHTML += `<option value="${t.tname}" data-size="${t.pod_size}">[${t.game}] ${t.tname}</option>`;
            });
        }
        updateWaitingList();
    }

    async function updateWaitingList() {
        const { data: regs } = await _supabase.from('ode_registrations')
            .select('*')
            .eq('event_id', eventPrefix)
            .eq('status', 'waiting');

        const listDiv = document.getElementById('waitingList');
        listDiv.innerHTML = "";

        if(!regs || regs.length === 0) {
            listDiv.innerHTML = "<p style='opacity:0.5; text-align:center; font-size:0.9rem;'>No players in queue.</p>";
            return; // <-- AQUI FOI CORRIGIDO (O 'Group' foi removido)
        }

        const groups = {};
        regs.forEach(r => { groups[r.tname] = (groups[r.tname] || 0) + 1; });

        for (const [name, count] of Object.entries(groups)) {
            const option = document.querySelector(`#tourSelect option[value="${name}"]`);
            const targetSize = option ? option.dataset.size : 4;

            listDiv.innerHTML += `
                <div class="pod-row">
                    <div class="pod-info"><b>${name}</b></div>
                    <div class="pod-count">${count} / ${targetSize}</div>
                </div>
            `;
        }
    }

    async function registerPlayer() {
        const name = document.getElementById('playerName').value.trim();
        const tname = document.getElementById('tourSelect').value;
        if(!name || !tname) { alert("Please enter player name and select a tournament."); return; }

        const { error } = await _supabase.from('ode_registrations').insert([
            { event_id: eventPrefix, player_name: name, tname: tname, status: 'waiting' }
        ]);

        if(!error) {
            document.getElementById('playerName').value = "";
            updateWaitingList();
        }
    }

    function backToLead() {
        const pass = prompt("ENTER LEAD PASSWORD:");
        const masterLeadPass = (eventPrefix || "").toUpperCase() + "_LEAD";
        if(pass && pass.toUpperCase() === masterLeadPass) {
            window.location.href = `admin_lead.html?event=${eventPrefix}`;
        } else if(pass) {
            alert("WRONG PASSWORD!");
        }
    }

    function navToTables() {
        window.location.href = `admin_tables.html?event=${eventPrefix}`;
    }

    _supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'ode_registrations' }, updateWaitingList).subscribe();
</script>
</body>
</html>
