<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideFlow - SCH Registration & Payout</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0d1b2a; --sec: #1b263b; --gold: #ffb703; --blue: #457b9d; --white: #e0e1dd; --red: #e63946; --dark: #0a141f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding: 20px; padding-bottom: 100px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 700px; }
        h2 { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; text-align: center; margin-bottom: 5px; }
        .sub-title { text-align: center; font-size: 0.8rem; opacity: 0.7; margin-bottom: 25px; letter-spacing: 1px; }
        .box { background: var(--sec); padding: 25px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.4); margin-bottom: 25px; border-bottom: 4px solid var(--gold); }
        label { display: block; font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; color: var(--gold); text-transform: uppercase; }
        input, select { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: var(--bg); color: white; font-size: 1rem; margin-bottom: 20px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; border-radius: 8px; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        .btn-calc { background: var(--gold); color: var(--bg); margin-top: 10px; }
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .nav-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: #162a44; padding: 15px; display: flex; justify-content: center; gap: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-footer button { width: auto; padding: 10px 20px; font-size: 0.75rem; background: var(--blue); color: white; }
        
        #printArea { background: white; color: black; padding: 40px; width: 100%; max-width: 800px; display: none; margin-top: 20px; border-radius: 8px; }
        .pdf-header { text-align: center; border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        .pdf-header img { height: 60px; margin-bottom: 10px; }
        .payout-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .payout-table th, .payout-table td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        .payout-table th { background: #f4f4f4; text-transform: uppercase; font-size: 0.8rem; }
        
        @media print {
            body * { visibility: hidden; background: white !important; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { position: absolute; left: 0; top: 0; width: 100%; display: block !important; box-shadow: none; padding: 0; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <h2>STAFF ACCESS - SCH</h2>
    <input type="password" id="passInput" placeholder="PASSWORD" style="width: 250px; text-align: center;">
    <button onclick="checkLogin()" style="width: 250px;" class="btn-calc">UNLOCK</button>
</div>

<div class="container no-print">
    <h2>TOURNAMENT PAYOUT SCH</h2>
    <div class="sub-title">SCHEDULED EVENT MANAGEMENT</div>
    
    <div class="box">
        <label>Select Tournament</label>
        <select id="tourSelect"></select>
        
        <label>Total Players</label>
        <input type="number" id="numPlayers" placeholder="0"> 
        <button class="btn-calc" onclick="generateAndSave()">GENERATE PAYOUT & SAVE</button>
    </div>
</div>

<div id="printArea">
    <div class="pdf-header">
        <img id="pdfLogo" src="">
        <h1 id="pdfEventName" style="margin:0; font-size: 1.5rem;"></h1>
        <p id="pdfDate" style="margin:5px 0; font-weight: bold;"></p>
        <h2 id="pdfTourName" style="margin:5px 0; color: #e63946;"></h2>
        <p id="pdfDetails" style="font-size: 0.9rem; font-weight: bold;"></p>
    </div>
    <table class="payout-table">
        <thead><tr><th>RANK</th><th>PRIZE (TICKETS)</th></tr></thead>
        <tbody id="payoutBody"></tbody>
    </table>
    <div style="text-align:center; margin-top:30px;" class="no-print">
        <button onclick="window.print()" style="background:#333; color:white; padding:10px 20px; width:auto;">🖨️ PRINT PARTIAL</button>
    </div>
</div>

<div class="nav-footer no-print">
    <button onclick="backToLead()">⬅ BACK TO LEAD SETUP</button>
</div>

<script>
    const supabaseUrl = 'https://hocpoastnlcwgedvcyqs.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvY3BvYXN0bmxjd2dlZHZjeXFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODU0MTYsImV4cCI6MjA4OTg2MTQxNn0.1MvvcFsnGW4e0Bj7mzoUKs_3bGM-eHDJTOqsvgKe-pI';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
    const urlParams = new URLSearchParams(window.location.search);
    let eventPrefix = urlParams.get('event') || localStorage.getItem('active_event_id');
    let catalog = [];
    let eventName = "";
    let logoType = "";

    window.onload = async () => {
        if(!eventPrefix) return;
        if(sessionStorage.getItem('sch_auth') === 'true') {
            document.getElementById('loginOverlay').style.display = 'none';
            await loadInitialData();
        }
    };

    function checkLogin() {
        const passInput = document.getElementById('passInput').value.toUpperCase().trim();
        const letters = eventPrefix.slice(0, 3);
        const lastNums = eventPrefix.slice(-2);
        const masterPass = (letters + lastNums + "SCH").toUpperCase();
        if(passInput === masterPass) {
            sessionStorage.setItem('sch_auth', 'true');
            location.reload();
        } else { alert("ACCESS DENIED."); }
    }

    async function loadInitialData() {
        const { data: idData } = await _supabase.from('tournament_history').select('*').eq('event_id', eventPrefix).eq('tournament_id', 0).single();
        if(idData) { eventName = idData.event_name; logoType = idData.logo_type; }

        const { data: catData } = await _supabase.from('tournament_catalog').select('*').eq('event_id', eventPrefix).eq('item_type', 'SCH');
        catalog = catData || [];
        const select = document.getElementById('tourSelect');
        select.innerHTML = '<option value="">-- SELECT --</option>';
        catalog.forEach((t, index) => {
            select.innerHTML += `<option value="${index}">${t.tname}</option>`;
        });
    }

    function getPayoutRank(p) {
        if (p >= 129) return 64; if (p >= 65) return 32;
        if (p >= 33) return 16; if (p >= 17) return 8;
        if (p >= 9) return 4; return 2;
    }

    function round10(v) { return Math.round(v / 10) * 10; }

    async function generateAndSave() {
        const idx = document.getElementById('tourSelect').value;
        const p = parseInt(document.getElementById('numPlayers').value);
        
        if(idx === "" || !p || p < 4) return alert("Select tournament and min. 4 players.");

        const t = catalog[idx];
        const totalTickets = (t.tfee - t.tcost) * 10 * p;
        const partIndiv = round10((totalTickets * (t.tax / 100)) / p);
        const pool = totalTickets - (partIndiv * p);
        const rankCut = getPayoutRank(p);

        let tiers = [{ name: "1st Place", count: 1 }];
        if (rankCut >= 2) tiers.push({ name: "2nd Place", count: 1 });
        if (rankCut >= 4) tiers.push({ name: "3rd - 4th", count: 2 });
        if (rankCut >= 8) tiers.push({ name: "5th - 8th", count: 4 });
        if (rankCut >= 16) tiers.push({ name: "9th - 16th", count: 8 });
        if (rankCut >= 32) tiers.push({ name: "17th - 32nd", count: 16 });

        let totalW = 0;
        const factor = parseFloat(t.spread);
        tiers.forEach((tier, i) => { 
            tier.weight = Math.pow(factor, (tiers.length - 1) - i); 
            totalW += (tier.weight * tier.count); 
        });

        const unit = pool / totalW;
        const body = document.getElementById('payoutBody');
        body.innerHTML = "";
        
        tiers.forEach(tier => {
            let prize = round10(unit * tier.weight) + partIndiv;
            if (prize > 0) {
                body.innerHTML += `<tr><td>${tier.name}</td><td>${prize.toLocaleString()}</td></tr>`;
            }
        });
        
        if (partIndiv > 0) {
            body.innerHTML += `<tr style="background:#f9f9f9"><td>Participation (All)</td><td>${partIndiv.toLocaleString()}</td></tr>`;
        }

        document.getElementById('pdfEventName').innerText = eventName;
        document.getElementById('pdfDate').innerText = new Date().toLocaleDateString('pt-BR');
        document.getElementById('pdfTourName').innerText = t.tname;
        document.getElementById('pdfLogo').src = logoType === "REGIONAL" ? "reg.PNG" : "ic.png";
        document.getElementById('pdfDetails').innerText = `Players: ${p} | Fee: $${t.tfee} | Rounds: ${p >= 33 ? 6 : 4}`;
        document.getElementById('printArea').style.display = 'block';

        const payload = {
            event_id: eventPrefix, tournament_id: t.id, tournament_name: t.tname,
            schedule: `${t.tday} - ${t.thour}`, players: p, entry_fee: t.tfee,
            costs: t.tcost, total_tickets: totalTickets, event_name: eventName, logo_type: logoType
        };
        await _supabase.from('tournament_history').upsert(payload, { onConflict: 'event_id, tournament_id' });
    }

    function backToLead() {
        const pass = prompt("ENTER LEAD PASSWORD:");
        if(pass && pass.toUpperCase() === (eventPrefix.toUpperCase() + "_LEAD")) {
            window.location.href = `admin_lead.html?event=${eventPrefix}`;
        }
    }
</script>
</body>
</html>
