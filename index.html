<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideFlow Hub - LOGIN</title>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: #161616; padding: 40px; border-radius: 15px; border: 1px solid #333; text-align: center; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #0070f3; font-size: 26px; margin-bottom: 5px; }
        p { color: #eab308; font-size: 13px; margin-bottom: 25px; font-weight: bold; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background: #222; color: white; text-align: center; box-sizing: border-box; font-size: 18px; letter-spacing: 2px; text-transform: uppercase; }
        button { width: 100%; padding: 15px; background: #0070f3; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; transition: 0.3s; }
        button:hover { background: #005bc1; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>SideFlow Hub</h1>
        <p>SYSTEM LOGIN</p>
        <input type="password" id="accessCode" placeholder="ACCESS CODE">
        <button onclick="verificarAcesso()">ENTER</button>
    </div>

    <script>
        const supabaseUrl = 'https://hocpoastnlcwgedvcyqs.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvY3BvYXN0bmxjd2dlZHZjeXFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODU0MTYsImV4cCI6MjA4OTg2MTQxNn0.1MvvcFsnGW4e0Bj7mzoUKs_3bGM-eHDJTOqsvgKe-pI';

        async function verificarAcesso() {
            let code = document.getElementById('accessCode').value.toUpperCase().trim();
            if (!code) { alert("Please enter an access code!"); return; }

            try {
                // Puxa apenas a coluna 'prefix' dos eventos ativos (sem pedir colunas que não existem)
                let resposta = await fetch(`${supabaseUrl}/rest/v1/active_events?select=prefix`, {
                    headers: { 'apikey': supabaseKey, 'Authorization': `Bearer ${supabaseKey}` }
                });
                
                if (!resposta.ok) throw new Error("Falha ao conectar no banco.");
                
                let eventos = await resposta.json();
                let matchedEvent = null;
                let targetPage = "";

                // Verifica contra as senhas de todos os eventos ativos
                for (let ev of eventos) {
                    let p = ev.prefix.toUpperCase();

                    // Monta as 3 senhas possíveis para este evento
                    let leadPass = p + "_LEAD";
                    let odePass = p.slice(0, 5) + "ODE"; // 3 letras + 2 primeiros nums
                    let schPass = p.slice(0, 3) + p.slice(-2) + "SCH"; // 3 letras + 2 últimos nums

                    if (code === leadPass) {
                        matchedEvent = p;
                        targetPage = "admin_lead.html";
                        break;
                    } else if (code === odePass) {
                        matchedEvent = p;
                        targetPage = "admin_ode.html";
                        sessionStorage.setItem('ode_auth', 'true'); // Libera o overlay do ODE direto
                        break;
                    } else if (code === schPass) {
                        matchedEvent = p;
                        targetPage = "admin_sch.html";
                        sessionStorage.setItem('sch_auth', 'true'); // Libera o overlay do SCH direto
                        break;
                    }
                }

                if (matchedEvent) {
                    // Manda para a página certa já com a URL completa do evento
                    window.location.href = `${targetPage}?event=${matchedEvent}`;
                } else {
                    alert("🚫 Access Denied. Invalid Code or Event not found.");
                }

            } catch (err) {
                alert("Connection error: " + err.message);
            }
        }
    </script>
</body>
</html>
