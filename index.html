<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideFlow Hub - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0d1b2a; --sec: #1b263b; --gold: #ffb703; --white: #e0e1dd; --blue: #0070f3; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--sec); padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 350px; text-align: center; border: 1px solid rgba(255,255,255,0.05); }
        h1 { color: var(--blue); margin: 0 0 5px 0; font-size: 1.8rem; letter-spacing: 1px; }
        h2 { color: var(--gold); margin: 0 0 30px 0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: white; font-size: 1rem; margin-bottom: 20px; box-sizing: border-box; text-align: center; letter-spacing: 2px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--blue); }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; background: var(--blue); color: white; transition: 0.3s; letter-spacing: 1px; }
        button:hover { filter: brightness(1.1); box-shadow: 0 0 15px rgba(0, 112, 243, 0.4); }
    </style>
</head>
<body>

<div class="login-box">
    <h1>SideFlow Hub</h1>
    <h2>SYSTEM LOGIN</h2>
    
    <input type="password" id="accessCode" placeholder="ACCESS CODE" onkeypress="handleEnter(event)">
    <button onclick="processLogin()">ENTER</button>
</div>

<script>
    const supabaseUrl = 'https://hocpoastnlcwgedvcyqs.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvY3BvYXN0bmxjd2dlZHZjeXFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODU0MTYsImV4cCI6MjA4OTg2MTQxNn0.1MvvcFsnGW4e0Bj7mzoUKs_3bGM-eHDJTOqsvgKe-pI';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    function handleEnter(e) {
        if (e.key === 'Enter') processLogin();
    }

    async function processLogin() {
        const pass = document.getElementById('accessCode').value.toUpperCase().trim();
        if(!pass) return;

        let eventId = "";
        let targetPage = "";
        let isLead = false;

        if (pass.endsWith("_LEAD")) {
            eventId = pass.replace("_LEAD", "");
            targetPage = "admin_lead.html";
            isLead = true;
        } else if (pass.endsWith("ODE")) {
            eventId = pass.replace("ODE", "");
            targetPage = "admin_ode.html";
            sessionStorage.setItem('ode_auth', 'true');
        } else if (pass.endsWith("SCH")) {
            eventId = pass.replace("SCH", "");
            targetPage = "admin_sch.html";
            sessionStorage.setItem('sch_auth', 'true');
        } else {
            return alert("INVALID ACCESS CODE FORMAT.");
        }

        if (eventId.length < 5) return alert("INVALID EVENT ID.");

        if (isLead) {
            window.location.href = `${targetPage}?event=${eventId}`;
        } else {
            const { data, error } = await _supabase.from('tournament_history').select('*').eq('event_id', eventId).eq('tournament_id', 0).single();
            if (data) {
                window.location.href = `${targetPage}?event=${eventId}`;
            } else {
                alert("EVENT NOT ACTIVATED YET. CONTACT LEAD.");
            }
        }
    }
</script>

</body>
</html>
