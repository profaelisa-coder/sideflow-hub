<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideFlow Hub - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #1A4B84; --sec: #2B6CB0; --gold: #ffb703; --white: #e0e1dd; --blue: #63B3ED; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--sec); padding: 40px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.4); width: 100%; max-width: 350px; text-align: center; border: 2px solid rgba(255, 183, 3, 0.4); }
        h1 { color: var(--white); margin: 0 0 5px 0; font-size: 1.8rem; letter-spacing: 1px; }
        h2 { color: var(--gold); margin: 0 0 30px 0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.4); background: rgba(0,0,0,0.15); color: white; font-size: 1rem; margin-bottom: 20px; box-sizing: border-box; text-align: center; letter-spacing: 2px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); background: rgba(0,0,0,0.25); }
        button { width: 100%; padding: 15px; border-radius: 8px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; background: var(--gold); color: #1A4B84; transition: 0.3s; letter-spacing: 1px; }
        button:hover { filter: brightness(1.1); box-shadow: 0 0 15px rgba(255, 183, 3, 0.5); }
    </style>
</head>
<body>

<div class="login-box">
    <h1>SideFlow Hub</h1>
    <h2>SYSTEM LOGIN</h2>
    
    <input type="password" id="accessCode" placeholder="ACCESS CODE" onkeypress="handleEnter(event)">
    <button onclick="processLogin()">ENTER</button>
</div>

<script>
    const supabaseUrl = 'https://hocpoastnlcwgedvcyqs.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvY3BvYXN0bmxjd2dlZHZjeXFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODU0MTYsImV4cCI6MjA4OTg2MTQxNn0.1MvvcFsnGW4e0Bj7mzoUKs_3bGM-eHDJTOqsvgKe-pI';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

    function handleEnter(e) {
        if (e.key === 'Enter') processLogin();
    }

    async function processLogin() {
        const pass = document.getElementById('accessCode').value.toUpperCase().trim();
        if(!pass) return;

        let targetPage = "";
        let authType = "";
        let searchPattern = "";

        
        if (pass.endsWith("_LEAD")) {
            const eventId = pass.replace("_LEAD", "");
            const regexLead = /^[A-Z]{3}\d{4}$/;
            if (!regexLead.test(eventId)) {
                return alert("INVALID LEAD FORMAT");
            }
            
            window.location.href = `admin_lead.html?event=${eventId}`;
            return;
        } 
        
        else if (pass.endsWith("ODE") && pass.length === 8) {
            const letters = pass.substring(0, 3);
            const nums = pass.substring(3, 5);
            
            if (!/^[A-Z]{3}\d{2}$/.test(letters + nums)) return alert("INVALID ODE FORMAT");
            
            searchPattern = `${letters}${nums}%`; // Procura no banco TST12...
            targetPage = "admin_ode.html";
            authType = "ode_auth";
        } 
        
        else if (pass.endsWith("SCH") && pass.length === 8) {
            const letters = pass.substring(0, 3);
            const nums = pass.substring(3, 5);
            
            if (!/^[A-Z]{3}\d{2}$/.test(letters + nums)) return alert("INVALID SCH FORMAT");
            
            searchPattern = `${letters}%${nums}`; // Procura no banco TST...34
            targetPage = "admin_sch.html";
            authType = "sch_auth";
        } 
        else {
            return alert("INVALID FORMAT");
        }

        
        const { data, error } = await _supabase.from('tournament_history')
            .select('event_id')
            .ilike('event_id', searchPattern)
            .eq('tournament_id', 0)
            .limit(1)
            .single();

        if (data) {
            sessionStorage.setItem(authType, 'true');
            window.location.href = `${targetPage}?event=${data.event_id}`;
        } else {
            alert("EVENT NOT FOUND");
        }
    }
</script>

</body>
</html>
