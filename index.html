<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideFlow Hub - Acesso</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: #161616; padding: 40px; border-radius: 15px; border: 1px solid #333; text-align: center; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #0070f3; font-size: 26px; margin-bottom: 5px; }
        p { color: #888; font-size: 13px; margin-bottom: 25px; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background: #222; color: white; text-align: center; box-sizing: border-box; font-size: 18px; letter-spacing: 2px; text-transform: uppercase; }
        button { width: 100%; padding: 15px; background: #0070f3; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; transition: 0.3s; }
        button:hover { background: #005bc1; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>SideFlow Hub</h1>
        <p>CENTRAL DE COMANDO</p>
        <input type="password" id="accessCode" placeholder="CÓDIGO DE ACESSO">
        <button onclick="verificarAcesso()">ENTRAR</button>
    </div>

    <script>
        // CONEXÃO COM O BANCO
        const supabaseUrl = 'https://hocpoastnlcwgedvcyqs.supabase.co';
	const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvY3BvYXN0bmxjd2dlZHZjeXFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODU0MTYsImV4cCI6MjA4OTg2MTQxNn0.1MvvcFsnGW4e0Bj7mzoUKs_3bGM-eHDJTOqsvgKe-pI';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function verificarAcesso() {
            let code = document.getElementById('accessCode').value.toUpperCase().trim();
            if (!code) { alert("Digite um código de acesso!"); return; }

            // 1. LÓGICA DO LEAD (CRIANDO O EVENTO)
            if (code.endsWith("_LEAD")) {
                let base = code.replace("_LEAD", ""); // Tira o _LEAD (Fica Ex: CTB4321)
                
                if (base.length < 5) { alert("Código muito curto. Use LLL+NNNN+_LEAD"); return; }
                
                let numbers = base.slice(-4); // Pega os 4 últimos números (Ex: 4321)
                let prefix = base.slice(0, -4); // Pega o que sobrou (Ex: CTB)
                let num_ode = numbers.slice(0, 2); // Pega os 2 primeiros números (Ex: 43)
                let num_sch = numbers.slice(2, 4); // Pega os 2 últimos números (Ex: 21)

                // Salva no Supabase!
                const { error } = await _supabase
                    .from('active_events')
                    .insert([{ prefix: prefix, num_ode: num_ode, num_sch: num_sch, lead_password: code }]);

                if (error) { 
                    alert("Erro ao criar evento: " + error.message); 
                } else {
                    alert("🎉 Evento " + prefix + " ativado com sucesso!\n\nSenhas geradas:\nStaff ODE: " + prefix + num_ode + "ODE\nStaff SCH: " + prefix + num_sch + "SCH");
                    // O Lead ainda não tem a página dele pronta, então por enquanto fica aqui.
                }
            }
            
            // 2. LÓGICA DO STAFF ON-DEMAND (ODE)
            else if (code.endsWith("ODE")) {
                let base = code.replace("ODE", ""); // Tira o ODE (Fica Ex: CTB43)
                let num_ode = base.slice(-2); // Pega os 2 números (Ex: 43)
                let prefix = base.slice(0, -2); // Pega as letras (Ex: CTB)

                // Vai no banco conferir se esse evento existe
                const { data, error } = await _supabase
                    .from('active_events')
                    .select('*')
                    .eq('prefix', prefix)
                    .eq('num_ode', num_ode);

                if (data && data.length > 0) {
                    window.location.href = "admin.html"; // Libera a catraca!
                } else {
                    alert("🚫 Acesso negado. Evento ODE não encontrado.");
                }
            }

            // 3. LÓGICA DO STAFF SCHEDULED (SCH)
            else if (code.endsWith("SCH")) {
                let base = code.replace("SCH", ""); // Tira o SCH (Fica Ex: CTB21)
                let num_sch = base.slice(-2); // Pega os 2 números (Ex: 21)
                let prefix = base.slice(0, -2); // Pega as letras (Ex: CTB)

                // Vai no banco conferir
                const { data, error } = await _supabase
                    .from('active_events')
                    .select('*')
                    .eq('prefix', prefix)
                    .eq('num_sch', num_sch);

                if (data && data.length > 0) {
                    window.location.href = "scheduled.html"; // Libera a catraca!
                } else {
                    alert("🚫 Acesso negado. Evento SCH não encontrado.");
                }
            }

            // 4. DIGITOU QUALQUER OUTRA COISA
            else {
                alert("🚫 Código inválido. Verifique o formato.");
            }
        }
    </script>
</body>
</html>
