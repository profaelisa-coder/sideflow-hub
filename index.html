<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideFlow Hub - Acesso</title>
    <style>
        body { font-family: sans-serif; background: #0a0a0a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: #161616; padding: 40px; border-radius: 15px; border: 1px solid #333; text-align: center; width: 300px; }
        h1 { color: #0070f3; font-size: 24px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #333; background: #222; color: white; text-align: center; box-sizing: border-box; font-size: 18px; letter-spacing: 2px; }
        button { width: 100%; padding: 12px; background: #0070f3; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>SideFlow Hub</h1>
        <p style="color: #888; font-size: 14px;">Digite seu código de acesso</p>
        <input type="password" id="accessCode" placeholder="••••••">
        <button onclick="verificarAcesso()">ENTRAR</button>
    </div>

    <script>
        function verificarAcesso() {
            const code = document.getElementById('accessCode').value.toUpperCase();
            
            // Exemplo da sua lógica de senha:
            // LLL = Letras do Evento (Ex: ORL para Orlando)
            // XX = Números
            
            if (code === "ADMIN123") {
                window.location.href = "lead.html"; // Página do Lead
            } else if (code.includes("SCH")) {
                window.location.href = "scheduled.html"; // Página do Staff Scheduled
            } else if (code.includes("ODE")) {
                window.location.href = "admin.html"; // Página do Staff On-Demand
            } else {
                alert("Código inválido. Verifique com seu Lead.");
            }
        }
    </script>
</body>
</html>
