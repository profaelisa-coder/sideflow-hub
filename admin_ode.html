<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideFlow - Staff ODE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #1A4B84; --sec: #2B6CB0; --gold: #ffb703; --blue: #63B3ED; --white: #e0e1dd; --red: #e63946; --green: #2ecc71; --dark: #0A2540; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding: 20px; padding-bottom: 120px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 800px; }
        .header-top { display: grid; grid-template-columns: 100px 1fr 100px; align-items: center; margin-bottom: 30px; width: 100%; }
        h2 { grid-column: 2; text-align: center; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin: 0; font-size: 1.3rem; white-space: nowrap; }
        .btn-return { grid-column: 3; justify-self: end; background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 5px 10px; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.7rem; width: auto; transition: 0.3s; }
        .btn-return:hover { background: var(--gold); color: var(--dark); }
        .box { background: var(--sec); padding: 25px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.4); margin-bottom: 25px; border-bottom: 4px solid var(--gold); }
        .row { display: flex; gap: 15px; margin-bottom: 15px; width: 100%; }
        .col { flex: 1; display: flex; flex-direction: column; }
        label { display: block; font-size: 0.75rem; font-weight: bold; margin-bottom: 8px; color: var(--gold); text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.15); color: white; font-size: 0.95rem; box-sizing: border-box; transition: 0.3s; }
        input:focus, select:focus { border-color: var(--gold); outline: none; background: rgba(0,0,0,0.3); }
        button { width: 100%; padding: 16px; border-radius: 8px; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; font-size: 0.9rem; }
        button:hover { filter: brightness(1.1); }
        .btn-reg { background: var(--gold); color: var(--dark); }
        .live-label { color: var(--gold); font-size: 0.9rem; font-weight: bold; margin: 20px 0 10px 0; display: flex; align-items: center; gap: 8px; }
        .live-dot { width: 8px; height: 8px; background: var(--red); border-radius: 50%; animation: blink 1s infinite; }
        .live-dot.green { background: var(--green); }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        /* Design 3D dos Cards conforme Imagens Anexas */
        .card-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; width: 100%; margin-bottom: 20px; }
        .pod-card-3d {
            background: var(--dark);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: inset 1px 1px 0px rgba(255,255,255,0.1), inset -2px -2px 0px rgba(0,0,0,0.4), 2px 2px 6px rgba(0,0,0,0.3);
            box-sizing: border-box;
            width: 100%;
        }
        .pod-info-3d { display: flex; flex-direction: column; gap: 3px; }
        .pod-info-3d b { color: var(--gold); font-size: 1.05rem; margin: 0; line-height: 1; }
        .pod-info-3d small { color: var(--white); font-size: 0.75rem; margin: 0; line-height: 1; opacity: 0.8; }
        .pill-blue { background: var(--blue); color: var(--dark); padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; box-shadow: 1px 1px 3px rgba(0,0,0,0.3); }
        .pill-green { background: var(--green); color: var(--dark); padding: 5px 12px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; box-shadow: 1px 1px 3px rgba(0,0,0,0.3); text-transform: uppercase; }
        
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: var(--sec); padding: 30px; border-radius: 12px; border-top: 4px solid var(--gold); width: 90%; max-width: 450px; text-align: center; }
        
        #loginOverlay { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #loginOverlay input { width: 250px; text-align: center; margin-bottom: 20px; }
        #loginOverlay button { width: 250px; }
        .nav-footer { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--dark); padding: 15px; display: flex; justify-content: center; gap: 15px; border-top: 1px solid rgba(255,255,255,0.1); }
        .nav-footer button { width: auto; padding: 10px 20px; font-size: 0.75rem; background: var(--sec); color: white; border: 1px solid var(--blue); }
    </style>
</head>
<body>

<div id="loginOverlay">
    <h2>STAFF ACCESS - ODE</h2>
    <input type="password" id="passInput">
    <button onclick="checkLogin()" class="btn-reg">UNLOCK</button>
</div>

<div id="passwordModal" class="modal">
    <div class="modal-content">
        <h3 style="color: var(--gold); margin-top: 0;">LEAD AUTHORIZATION</h3>
        <label>Enter Lead Password</label>
        <input type="password" id="leadPassField" style="margin-bottom: 20px;">
        <div class="row">
            <button class="btn-reg" onclick="confirmBack()">CONFIRM</button>
            <button style="background: var(--red); color: white;" onclick="closeModal('passwordModal')">CANCEL</button>
        </div>
    </div>
</div>

<div class="container">
    <div class="header-top">
        <h2>TOURNAMENT REGISTRATION ODE</h2>
        <button class="btn-return" onclick="openPasswordModal()">BACK</button>
    </div>
    
    <div class="box">
        <div class="row">
            <div class="col">
                <label>Tournament Pod</label>
                <select id="tourSelect" onchange="updateGroupSizeOptions()"><option value="">LOADING...</option></select>
            </div>
            <div class="col">
                <label>How Many Players?</label>
                <select id="groupSizeSelect" onchange="renderPlayerInputs()" disabled>
                    <option value="1">1 Player</option>
                </select>
            </div>
        </div>
        
        <div id="playersContainer"></div>

        <button class="btn-reg" style="width: 100%; margin-top: 15px;" onclick="submitRegistration()">REGISTER TO POD</button>
    </div>
    
    <div class="live-label"><div class="live-dot"></div> WAITING QUEUE</div>
    <div id="waitingList" class="card-container"></div>
    <div class="live-label"><div class="live-dot green"></div> ACTIVE PODS ON TABLES</div>
    <div id="activePodsList" class="card-container"></div>
</div>

<div class="nav-footer">
    <button onclick="navToTables()">VIEW TABLE MAP</button>
</div>

<script>
    const supabaseUrl = 'https://hocpoastnlcwgedvcyqs.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvY3BvYXN0bmxjd2dlZHZjeXFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODU0MTYsImV4cCI6MjA4OTg2MTQxNn0.1MvvcFsnGW4e0Bj7mzoUKs_3bGM-eHDJTOqsvgKe-pI';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
    const urlParams = new URLSearchParams(window.location.search);
    let eventPrefix = urlParams.get('event') || localStorage.getItem('active_event_id');
    let currentCatalog = [];

    window.onload = () => {
        if(!eventPrefix) return;
        if(sessionStorage.getItem('ode_auth') === 'true') {
            document.getElementById('loginOverlay').style.display = 'none';
            loadData();
        }
    };

    function checkLogin() {
        const passInput = document.getElementById('passInput').value.toUpperCase().trim();
        const masterPass = eventPrefix.substring(0,3).toUpperCase() + eventPrefix.substring(3,5) + "ODE";
        if(passInput === masterPass) {
            sessionStorage.setItem('ode_auth', 'true');
            location.reload();
        } else { alert("ACCESS DENIED."); }
    }

    function openPasswordModal() { document.getElementById('passwordModal').style.display = 'flex'; }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    
    function confirmBack() {
        const pass = document.getElementById('leadPassField').value.toUpperCase().trim();
        if(pass === eventPrefix.toUpperCase() + "_LEAD") {
            window.location.href = `admin_lead.html?event=${eventPrefix}`;
        } else { alert("INCORRECT PASSWORD."); }
    }

    async function loadData() {
        const { data: catalog } = await _supabase.from('tournament_catalog').select('*').eq('event_id', eventPrefix).eq('item_type', 'ODE');
        currentCatalog = catalog || [];
        const select = document.getElementById('tourSelect');
        select.innerHTML = '<option value="">-- SELECT TOURNAMENT --</option>';
        if(catalog) catalog.forEach(t => select.innerHTML += `<option value="${t.tname}" data-size="${t.pod_size || 4}">${t.tname}</option>`);
        
        updateGroupSizeOptions();
        updateWaitingList();
        updateActivePods();
    }

    function updateGroupSizeOptions() {
        const tname = document.getElementById('tourSelect').value;
        const groupSelect = document.getElementById('groupSizeSelect');
        groupSelect.innerHTML = "";
        
        if(!tname) {
            groupSelect.innerHTML = '<option value="1">1 Player</option>';
            groupSelect.disabled = true;
            document.getElementById('playersContainer').innerHTML = "";
            return;
        }

        const size = parseInt(document.querySelector(`#tourSelect option[value="${tname}"]`).dataset.size);
        for(let i = 1; i <= size; i++) {
            groupSelect.innerHTML += `<option value="${i}">${i} Player${i > 1 ? 's' : ''}</option>`;
        }
        groupSelect.disabled = false;
        renderPlayerInputs();
    }

    function renderPlayerInputs() {
        const qty = parseInt(document.getElementById('groupSizeSelect').value) || 0;
        const container = document.getElementById('playersContainer');
        container.innerHTML = "";
        
        for(let i = 1; i <= qty; i++) {
            container.innerHTML += `
                <div class="row" style="background: rgba(0,0,0,0.1); padding: 10px; border-radius: 8px; margin-bottom: 10px;">
                    <div class="col" style="margin-bottom: 0;">
                        <label style="font-size: 0.65rem;">Player ${i} ID</label>
                        <input type="number" class="dyn-id" autocomplete="off" style="padding: 10px;">
                    </div>
                    <div class="col" style="margin-bottom: 0;">
                        <label style="font-size: 0.65rem;">Player ${i} Name</label>
                        <input type="text" class="dyn-name" autocomplete="off" style="padding: 10px;">
                    </div>
                    <div class="col" style="margin-bottom: 0;">
                        <label style="font-size: 0.65rem;">WhatsApp (Opt)</label>
                        <input type="number" class="dyn-phone" autocomplete="off" style="padding: 10px;">
                    </div>
                </div>`;
        }
    }

    async function submitRegistration() {
        const tname = document.getElementById('tourSelect').value;
        if(!tname) return alert("Select tournament first.");
        
        const podLimit = parseInt(document.querySelector(`#tourSelect option[value="${tname}"]`).dataset.size);
        const groupSize = parseInt(document.getElementById('groupSizeSelect').value);
        
        const ids = document.querySelectorAll('.dyn-id');
        const names = document.querySelectorAll('.dyn-name');
        const phones = document.querySelectorAll('.dyn-phone');
        
        const players = [];
        for(let i = 0; i < groupSize; i++) {
            if(!ids[i].value || !names[i].value) return alert("Fill ID and Name for all players.");
            players.push({ id: ids[i].value, name: names[i].value, phone: phones[i].value });
        }

        const tour = currentCatalog.find(c => c.tname === tname);

        if (groupSize === podLimit) {
            const { data: tableData } = await _supabase.rpc('assign_table_smart', { 
                target_event_id: eventPrefix, min_t: tour.table_min, max_t: tour.table_max 
            });

            if(!tableData || tableData.length === 0) return alert("NO FREE TABLES IN RANGE!");
            const tableNum = tableData[0].table_number;
            
            const { data: podNum } = await _supabase.rpc('get_pod_for_group', { p_event_id: eventPrefix, p_tname: tname, p_pod_limit: podLimit, p_group_size: groupSize });

            const inserts = players.map(p => ({
                event_id: eventPrefix, player_id: p.id, player_name: p.name, player_phone: p.phone,
                tname: tname, status: 'allocated', pod_number: podNum, assigned_table: tableNum
            }));

            const { error } = await _supabase.from('ode_registrations').insert(inserts);
            if(!error) {
                await _supabase.from('event_tables').update({ tournament_name: tname, status: 'OCCUPIED' }).eq('event_id', eventPrefix).eq('table_number', tableNum);
                updateActivePods();
            }
        } else {
            const { data: podNum } = await _supabase.rpc('get_pod_for_group', { p_event_id: eventPrefix, p_tname: tname, p_pod_limit: podLimit, p_group_size: groupSize });

            const inserts = players.map(p => ({
                event_id: eventPrefix, player_id: p.id, player_name: p.name, player_phone: p.phone,
                tname: tname, status: 'waiting', pod_number: podNum
            }));

            const { error } = await _supabase.from('ode_registrations').insert(inserts);
            if(!error) {
                updateWaitingList();
            }
        }
        
        renderPlayerInputs();
        alert("Registration Successful!");
    }

    async function updateWaitingList() {
        const { data: regs } = await _supabase.from('ode_registrations').select('*').eq('event_id', eventPrefix).eq('status', 'waiting').order('pod_number', { ascending: true });
        const listDiv = document.getElementById('waitingList');
        listDiv.innerHTML = "";
        if(!regs || regs.length === 0) { listDiv.innerHTML = "<p style='opacity:0.5; text-align:center;'>No players in queue.</p>"; return; }
        const groups = {};
        regs.forEach(r => { const key = `${r.tname}|${r.pod_number}`; groups[key] = (groups[key] || 0) + 1; });
        for (const [key, count] of Object.entries(groups)) {
            const [tname, podNum] = key.split('|');
            const targetSize = currentCatalog.find(c => c.tname === tname)?.pod_size || 4;
            // Design 3D Card
            listDiv.innerHTML += `
                <div class="pod-card-3d">
                    <div class="pod-info-3d">
                        <b>${tname}</b>
                        <small>POD #${podNum}</small>
                    </div>
                    <div class="pill-blue">${count} / ${targetSize}</div>
                </div>`;
        }
    }

    async function updateActivePods() {
        const { data: active } = await _supabase.from('ode_registrations').select('*').eq('event_id', eventPrefix).eq('status', 'allocated').order('assigned_table', { ascending: true });
        const listDiv = document.getElementById('activePodsList');
        listDiv.innerHTML = "";
        if(!active || active.length === 0) { listDiv.innerHTML = "<p style='opacity:0.5; text-align:center;'>No active pods on tables.</p>"; return; }
        const uniquePods = {};
        active.forEach(r => {
            const key = `${r.tname}|${r.pod_number}`;
            if(!uniquePods[key]) uniquePods[key] = { tname: r.tname, pod_number: r.pod_number, table: r.assigned_table };
        });
        for (const info of Object.values(uniquePods)) {
            // Design 3D Card
            listDiv.innerHTML += `
                <div class="pod-card-3d">
                    <div class="pod-info-3d">
                        <b>${info.tname}</b>
                        <small>POD #${info.pod_number}</small>
                    </div>
                    <div class="pill-green">TABLE ${info.table}</div>
                </div>`;
        }
    }

    function navToTables() { window.location.href = `admin_tables.html?event=${eventPrefix}`; }
    _supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'ode_registrations' }, () => { updateWaitingList(); updateActivePods(); }).subscribe();
    _supabase.channel('catalog_sync').on('postgres_changes', { event: '*', schema: 'public', table: 'tournament_catalog' }, loadData).subscribe();
</script>
</body>
</html>
