<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideFlow Hub - STAFF ODE AREA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #1d3557; --sec: #2a4a73; --gold: #ffb703; --blue: #457b9d; --red: #e63946; --dark: #162a44; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; padding-top: 50px; }
        h2 { text-align: center; letter-spacing: 2px; color: var(--gold); text-transform: uppercase; margin-bottom: 30px; }
        
        .card { background: var(--sec); padding: 30px; border-radius: 12px; border-left: 6px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .label-group { display: flex; flex-direction: column; margin-bottom: 20px; }
        label { font-size: 0.75rem; font-weight: bold; color: rgba(255,255,255,0.7); margin-bottom: 8px; text-transform: uppercase; }
        
        /* Estilização dos Inputs e Menus Suspensos Corrigida */
        input, select { 
            padding: 14px; 
            border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.2); 
            background: rgba(255,255,255,0.1); 
            color: white; 
            font-size: 1rem; 
            width: 100%; 
            box-sizing: border-box;
            appearance: none;
        }

        /* Cores do Menu Suspenso (Dropdown) */
        select option {
            background-color: var(--dark);
            color: white;
        }

        input:focus { border-color: var(--gold); outline: none; background: rgba(255,255,255,0.15); }

        .btn-register { 
            width: 100%; 
            padding: 18px; 
            background: var(--gold); 
            color: var(--bg); 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 1rem; 
            cursor: pointer; 
            text-transform: uppercase; 
            transition: 0.3s; 
            margin-top: 10px; 
        }
        .btn-register:hover { transform: scale(1.02); filter: brightness(1.1); }
        
        #msg { text-align: center; margin-top: 20px; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <h2>TOURNAMENT REGISTRATION</h2>

    <div class="card">
        <div class="label-group">
            <label>Tournament</label>
            <select id="tourSelect">
                <option value="">Loading...</option>
            </select>
        </div>

        <div class="label-group">
            <label>Player Name</label>
            <input type="text" id="playerName" placeholder="Full Name" autocomplete="off">
        </div>

        <div class="label-group">
            <label>WhatsApp Number</label>
            <input type="text" id="playerWA" placeholder="Ex: 5511999999999" autocomplete="off">
        </div>

        <button class="btn-register" id="regBtn" onclick="registerPlayer()">REGISTER PLAYER</button>
        <div id="msg"></div>
    </div>
</div>

<script>
    const supabaseUrl = 'https://hocpoastnlcwgedvcyqs.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvY3BvYXN0bmxjd2dlZHZjeXFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODU0MTYsImV4cCI6MjA4OTg2MTQxNn0.1MvvcFsnGW4e0Bj7mzoUKs_3bGM-eHDJTOqsvgKe-pI';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
    const eventPrefix = new URLSearchParams(window.location.search).get('event');

    window.onload = () => {
        if(!eventPrefix) return;
        loadTournaments();
    };

    async function loadTournaments() {
        const { data } = await _supabase.from('tournament_catalog').select('*').eq('event_id', eventPrefix).eq('item_type', 'ODE');
        const select = document.getElementById('tourSelect');
        select.innerHTML = '<option value="">Choose...</option>';
        if(data) {
            data.forEach(item => {
                select.innerHTML += `<option value="${item.tname}">[${item.game}] ${item.tname}</option>`;
            });
        }
    }

   async function registerPlayer() {
    const btn = document.getElementById('regBtn');
    const msg = document.getElementById('msg');
    const tname = document.getElementById('tourSelect').value;
    const pname = document.getElementById('playerName').value;
    const pwa = document.getElementById('playerWA').value;

    if(!tname || !pname || !pwa) { alert("Fill all fields!"); return; }

    btn.disabled = true;
    btn.innerText = "SAVING...";

    // 1. Insere o jogador
    const { error } = await _supabase.from('ode_registrations').insert([{
        event_id: eventPrefix,
        tname: tname,
        player_name: pname,
        whatsapp: pwa,
        status: 'waiting'
    }]);

    if(!error) {
        // 2. VERIFICAÇÃO DE FECHAMENTO (A LÓGICA DE 4)
        const { data: participants } = await _supabase
            .from('ode_registrations')
            .select('id')
            .eq('event_id', eventPrefix)
            .eq('tname', tname)
            .eq('status', 'waiting');

        if (participants.length >= 4) {
            // Se chegou a 4, vamos marcar como "busy" (ocupado/fechado)
            const idsToClose = participants.map(p => p.id);
            
            await _supabase
                .from('ode_registrations')
                .update({ status: 'closed' }) // ou 'playing'
                .in('id', idsToClose);

            alert("🚨 POD CLOSED! Send these 4 players to a table.");
        }

        msg.style.color = "var(--gold)";
        msg.innerText = "✅ PLAYER REGISTERED!";
        document.getElementById('playerName').value = "";
        document.getElementById('playerWA').value = "";
        setTimeout(() => { msg.innerText = ""; }, 3000);
    } else {
        alert("Error: " + error.message);
    }
    
    btn.disabled = false;
    btn.innerText = "REGISTER PLAYER";
}
    }
</script>

</body>
</html>
