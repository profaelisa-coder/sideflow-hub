<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideFlow Hub - LEAD SETUP AREA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #1d3557; --sec: #2a4a73; --gold: #ffb703; --blue: #457b9d; --red: #e63946; --dark: #162a44; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; padding-bottom: 100px; }
        h2 { text-align: center; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin-bottom: 30px; }
        .sector { background: var(--sec); padding: 25px; border-radius: 12px; margin-bottom: 25px; border-left: 6px solid var(--gold); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .sector-title { color: var(--gold); font-weight: bold; text-transform: uppercase; font-size: 0.9rem; display: block; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-bottom: 20px; }
        .grid { display: grid; gap: 15px; align-items: end; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.7rem; font-weight: bold; color: rgba(255,255,255,0.7); margin-bottom: 6px; text-transform: uppercase; }
        input, select { padding: 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; font-size: 0.9rem; appearance: none; }
        select option { background-color: var(--dark); color: white; }
        input:focus { border-color: var(--gold); outline: none; }
        button { padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; transition: 0.3s; }
        .btn-add { background: var(--gold); color: var(--bg); }
        .btn-blue { background: var(--blue); color: white; width: 100%; }
        .btn-red { background: var(--red); color: white; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.9rem; }
        .btn-del { color: var(--red); background: none; cursor: pointer; font-weight: bold; font-size: 11px; }
    </style>
</head>
<body>
<div class="container">
    <h2>LEAD SETUP AREA</h2>

    <div class="sector" id="sec-identity">
        <span class="sector-title">SECTION 1: EVENT IDENTITY</span>
        <div class="grid" style="grid-template-columns: 2fr 1fr 1fr 1fr;">
            <div class="input-group"><label>Event Name</label><input type="text" id="masterEvent" autocomplete="off" onchange="updateIdentity()"></div>
            <div class="input-group"><label>Logo</label><select id="masterLogo" onchange="updateIdentity()"><option value="REGIONAL">REGIONAL</option><option value="IC">IC</option></select></div>
            <div class="input-group"><label>Part %</label><input type="number" id="masterTax" value="20" autocomplete="off" onchange="updateIdentity()"></div>
            <div class="input-group"><label>Spread</label><select id="masterFactor" onchange="updateIdentity()"><option value="2.0">2.0</option><option value="1.75">1.75</option><option value="1.5">1.5</option></select></div>
        </div>
    </div>

    <div class="sector" id="sec-init">
        <span class="sector-title">SECTION 0: TABLE INITIALIZATION</span>
        <div class="grid" style="grid-template-columns: 1fr 2fr auto;">
            <div class="input-group">
                <label>Total Mesas</label>
                <input type="number" id="setupTableCount" value="120">
            </div>
            <div style="font-size: 0.8rem; opacity: 0.8; padding-top: 10px;">
                Informe o número de mesas e clique ao lado para gerar o mapa físico. <br>
                <strong>Atenção:</strong> Use apenas uma vez no início do evento.
            </div>
            <button class="btn-add" onclick="initTables()" style="background: var(--blue); color: white;">🛠️ GENERATE TABLES</button>
        </div>
    </div>

    <div class="sector" id="sec-sch">
        <span class="sector-title">SECTION 2: SCHEDULED CATALOG</span>
        <div class="grid" style="grid-template-columns: 2fr 1fr 1fr;">
            <div class="input-group"><label>Tournament Name</label><input type="text" id="schName" autocomplete="off"></div>
            <div class="input-group"><label>Day</label><select id="schDay"><option>Day 1</option><option>Day 2</option><option>Day 3</option></select></div>
            <div class="input-group"><label>Hour</label><input type="text" id="schHour" placeholder="9:00 AM" autocomplete="off"></div>
        </div>
        <div class="grid" style="grid-template-columns: 1fr 1fr auto; margin-top: 15px;">
            <div class="input-group"><label>Fee ($)</label><input type="number" id="schFee" autocomplete="off"></div>
            <div class="input-group"><label>Cost ($)</label><input type="number" id="schCost" autocomplete="off"></div>
            <button class="btn-add" onclick="addItem('SCH')">+ ADD SCH</button>
        </div>
        <table id="schList"><tbody></tbody></table>
    </div>

    <div class="sector" id="sec-ode">
        <span class="sector-title">SECTION 3: ON-DEMAND CATALOG & TABLES</span>
        <div class="grid" style="grid-template-columns: 1fr 2fr 1fr 1fr 1fr;">
            <div class="input-group"><label>Game</label><select id="odeGame"><option>TCG</option><option>VGC</option><option>GO</option><option>POCKET</option></select></div>
            <div class="input-group"><label>Pod Name</label><input type="text" id="odeName" placeholder="Ex: Turbo" autocomplete="off"></div>
            <div class="input-group"><label>Fee ($)</label><input type="number" id="odeFee" autocomplete="off"></div>
            <div class="input-group"><label>Cost ($)</label><input type="number" id="odeCost" autocomplete="off"></div>
            <div class="input-group"><label>Table Range</label><input type="text" id="tableRange" placeholder="1 TO 4" autocomplete="off"></div>
        </div>
        <div class="grid" style="margin-top: 15px;">
            <button class="btn-add" onclick="addItem('ODE_FULL')">+ ADD ON-DEMAND TORNEY</button>
        </div>
        <table id="odeList"><tbody></tbody></table>
    </div>

    <div class="sector" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <button class="btn-blue" onclick="navStaff('ode')">STAFF ODE AREA</button>
        <button class="btn-blue" onclick="navStaff('sch')">STAFF SCH AREA</button>
        <button class="btn-red" onclick="resetSystem()">RESET SYSTEM</button>
    </div>
</div>

<script>
    const supabaseUrl = 'https://hocpoastnlcwgedvcyqs.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvY3BvYXN0bmxjd2dlZHZjeXFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODU0MTYsImV4cCI6MjA4OTg2MTQxNn0.1MvvcFsnGW4e0Bj7mzoUKs_3bGM-eHDJTOqsvgKe-pI';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
    const eventPrefix = new URLSearchParams(window.location.search).get('event');

    window.onload = () => { if(!eventPrefix) window.location.href='index.html'; loadAll(); };

    async function initTables() {
        const count = parseInt(document.getElementById('setupTableCount').value);
        if(!count || count <= 0) { alert("Insira um número válido!"); return; }
        if(!confirm(`Deseja gerar ${count} mesas para o evento ${eventPrefix}?`)) return;

        const tableData = [];
        for (let i = 1; i <= count; i++) {
            tableData.push({ event_id: eventPrefix, table_number: i, status: 'vacant' });
        }

        const { error } = await _supabase.from('event_tables').insert(tableData);
        if (error) { alert("Erro: " + error.message); } 
        else { alert(`${count} mesas geradas com sucesso!`); }
    }

    async function updateIdentity() {
        await _supabase.from('tournament_history').upsert({ 
            event_id: eventPrefix, tournament_id: 'IDENTITY_ANCHOR', 
            event_name: document.getElementById('masterEvent').value,
            logo_type: document.getElementById('masterLogo').value,
            part_percent: document.getElementById('masterTax').value,
            spread_factor: document.getElementById('masterFactor').value
        }, { onConflict: 'event_id, tournament_id' });
    }

    async function addItem(type) {
        let payload = { event_id: eventPrefix };
        if(type === 'SCH') {
            payload.item_type = 'SCH';
            payload.tname = document.getElementById('schName').value;
            payload.tday = document.getElementById('schDay').value;
            payload.thour = document.getElementById('schHour').value;
            payload.tfee = document.getElementById('schFee').value;
            payload.tcost = document.getElementById('schCost').value;
            const { error } = await _supabase.from('tournament_catalog').insert([payload]);
            if(!error) { loadAll(); }
        } else if(type === 'ODE_FULL') {
            const tname = document.getElementById('odeName').value;
            const { error } = await _supabase.from('tournament_catalog').insert([
                { event_id: eventPrefix, item_type: 'ODE', game: document.getElementById('odeGame').value, tname: tname, tfee: document.getElementById('odeFee').value, tcost: document.getElementById('odeCost').value },
                { event_id: eventPrefix, item_type: 'TABLE', tname: tname, value: document.getElementById('tableRange').value }
            ]);
            if(!error) { loadAll(); }
        }
    }

    async function loadAll() {
        const { data, error } = await _supabase.from('tournament_catalog').select('*').eq('event_id', eventPrefix);
        if(error || !data) return;
        const schTbody = document.querySelector('#schList tbody');
        const odeTbody = document.querySelector('#odeList tbody');
        schTbody.innerHTML = ""; odeTbody.innerHTML = "";
        data.forEach(item => {
            if(item.item_type === 'SCH') {
                schTbody.innerHTML += `<tr><td><strong>${item.tname}</strong></td><td>${item.tday} | ${item.thour}</td><td>$${item.tfee}</td><td><button onclick="del('${item.id}')" class="btn-del">REMOVE</button></td></tr>`;
            } else {
                const label = item.item_type === 'TABLE' ? '📌 TABLE' : `🎮 ${item.game}`;
                odeTbody.innerHTML += `<tr><td>${item.tname}</td><td>${label}</td><td>${item.tfee || item.value}</td><td><button onclick="del('${item.id}')" class="btn-del">REMOVE</button></td></tr>`;
            }
        });
    }

    async function del(id) { if(confirm("Remove?")) { await _supabase.from('tournament_catalog').delete().eq('id', id); loadAll(); } }
    function navStaff(target) { window.location.href = `admin_${target}.html?event=${eventPrefix}`; }
    async function resetSystem() { if(confirm("RESET ALL?")) { await _supabase.from('tournament_catalog').delete().eq('event_id', eventPrefix); loadAll(); } }
</script>
</body>
</html>
