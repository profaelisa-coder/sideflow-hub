<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideFlow - LEAD SETUP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0d1b2a; --sec: #1b263b; --gold: #ffb703; --white: #e0e1dd; --blue: #457b9d; --red: #e63946; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 600px; padding-bottom: 50px; }
        .box { background: var(--sec); padding: 25px; border-radius: 12px; margin-bottom: 25px; border-bottom: 4px solid var(--gold); }
        h2 { color: var(--gold); text-align: center; }
        h3 { border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; margin-top: 0; }
        label { display: block; font-size: 0.8rem; font-weight: bold; margin-bottom: 8px; color: var(--gold); }
        input, select { width: 100%; padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: var(--bg); color: white; margin-bottom: 20px; box-sizing: border-box; }
        button { width: 100%; padding: 16px; border-radius: 8px; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; background: var(--gold); color: var(--bg); transition: 0.3s; }
        button:hover { filter: brightness(1.1); }
        .btn-blue { background: var(--blue); color: white; }
        .btn-nav { background: #333; color: white; border: 1px solid #555; }
        .reset-link { display: block; text-align: center; color: var(--red); font-size: 0.8rem; text-decoration: none; opacity: 0.6; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        .reset-link:hover { opacity: 1; text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2>LEAD COMMAND CENTER</h2>
    
    <div class="box">
        <h3>1. INITIALIZE EVENT</h3>
        <label>Event ID (Prefix)</label>
        <input type="text" id="eventId" disabled>
        
        <label>Official Event Name</label>
        <input type="text" id="eventName" placeholder="EX: SAO PAULO REGIONAL 2026">
        
        <label>Logo Type</label>
        <select id="logoType">
            <option value="REGIONAL">Regional Logo</option>
            <option value="PREMIER">Premier Logo</option>
        </select>
        
        <button onclick="saveEventAnchor()">🚀 SAVE & ACTIVATE EVENT</button>
    </div>

    <div class="box">
        <h3>2. TOURNAMENT CATALOG SETUP</h3>
        
        <label>Event Type</label>
        <select id="catType" onchange="toggleCatFields()">
            <option value="ODE">On-Demand Event (ODE)</option>
            <option value="SCH">Scheduled Event (SCH)</option>
        </select>

        <label>Game & Tournament Name</label>
        <input type="text" id="catGame" placeholder="GAME (EX: POKEMON)">
        <input type="text" id="catName" placeholder="TOURNAMENT NAME (EX: 8-PLAYER POD)">
        
        <label>Financials</label>
        <div style="display: flex; gap: 10px;">
            <input type="number" id="catFee" placeholder="ENTRY FEE ($)">
            <input type="number" id="catCost" placeholder="COST ($)">
        </div>

        <div id="odeFields">
            <label>ODE Settings</label>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="catPodSize" placeholder="POD SIZE (EX: 4)">
                <input type="number" id="catTickets" placeholder="TICKETS PER POD (EX: 500)">
            </div>
        </div>

        <div id="schFields" style="display:none;">
            <label>SCH Schedule</label>
            <div style="display: flex; gap: 10px;">
                <select id="catDay">
                    <option value="Day 1">Day 1</option>
                    <option value="Day 2">Day 2</option>
                    <option value="Day 3">Day 3</option>
                </select>
                <input type="text" id="catHour" placeholder="HOUR (EX: 14:00)">
            </div>
            <label>SCH Payout Rules</label>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="catTax" placeholder="TAX % (EX: 20)">
                <select id="catSpread">
                    <option value="2.0">2.0</option>
                    <option value="1.75">1.75</option>
                    <option value="1.5">1.5</option>
                </select>
            </div>
        </div>
        
        <button class="btn-blue" onclick="saveCatalog()">💾 ADD TO CATALOG</button>
    </div>

    <div class="box">
        <h3>3. QUICK NAVIGATION</h3>
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <button class="btn-nav" onclick="navTo('admin_ode.html')">🎫 STAFF ODE</button>
            <button class="btn-nav" onclick="navTo('admin_sch.html')">🏆 STAFF SCH</button>
        </div>
        <button class="btn-nav" style="background: var(--blue); color: white; border: none;" onclick="navTo('final_report.html')">📊 VIEW FINAL REPORT</button>
    </div>

    <a href="#" class="reset-link" onclick="resetEvent()">⚠️ DANGER: WIPE ALL EVENT DATA</a>
</div>

<script>
    const supabaseUrl = 'https://hocpoastnlcwgedvcyqs.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvY3BvYXN0bmxjd2dlZHZjeXFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODU0MTYsImV4cCI6MjA4OTg2MTQxNn0.1MvvcFsnGW4e0Bj7mzoUKs_3bGM-eHDJTOqsvgKe-pI';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
    const eventPrefix = new URLSearchParams(window.location.search).get('event');

    window.onload = () => {
        if(!eventPrefix) return document.body.innerHTML = "<h2 style='color:red; text-align:center;'>ACCESS DENIED</h2>";
        document.getElementById('eventId').value = eventPrefix;
    };

    async function saveEventAnchor() {
        const eName = document.getElementById('eventName').value.trim();
        const lType = document.getElementById('logoType').value;
        if(!eName) return alert("Fill the Event Name!");

        const payload = {
            event_id: eventPrefix,
            tournament_id: 0, 
            event_name: eName,
            logo_type: lType,
            tournament_name: 'SYSTEM_ANCHOR',
            players: 0, entry_fee: 0, costs: 0, total_tickets: 0
        };

        const { error } = await _supabase.from('tournament_history').upsert(payload, { onConflict: 'event_id, tournament_id' });
        
        if(!error) {
            alert(`Event ${eventPrefix} activated successfully! Staff can now log in.`);
        } else {
            alert("Error activating event: " + error.message);
        }
    }

    function toggleCatFields() {
        const type = document.getElementById('catType').value;
        document.getElementById('odeFields').style.display = type === 'ODE' ? 'block' : 'none';
        document.getElementById('schFields').style.display = type === 'SCH' ? 'block' : 'none';
    }

    async function saveCatalog() {
        const type = document.getElementById('catType').value;
        const payload = {
            event_id: eventPrefix,
            item_type: type,
            game: document.getElementById('catGame').value.trim(),
            tname: document.getElementById('catName').value.trim(),
            tfee: parseFloat(document.getElementById('catFee').value) || 0,
            tcost: parseFloat(document.getElementById('catCost').value) || 0
        };

        if(!payload.game || !payload.tname) return alert("Fill Game and Tournament Name.");

        if(type === 'ODE') {
            payload.pod_size = parseInt(document.getElementById('catPodSize').value) || 4;
            payload.tickets_per_pod = parseInt(document.getElementById('catTickets').value) || 0;
        } else {
            payload.tday = document.getElementById('catDay').value;
            payload.thour = document.getElementById('catHour').value.trim();
            payload.tax = parseFloat(document.getElementById('catTax').value) || 0;
            payload.spread = parseFloat(document.getElementById('catSpread').value) || 2.0;
        }

        const { error } = await _supabase.from('tournament_catalog').insert([payload]);
        
        if(!error) {
            alert(payload.tname + " added to catalog!");
            document.getElementById('catName').value = "";
            document.getElementById('catFee').value = "";
            document.getElementById('catCost').value = "";
            if(type === 'ODE') document.getElementById('catTickets').value = "";
        } else {
            alert("Error: " + error.message);
        }
    }

    function navTo(page) {
        if(!eventPrefix) return alert("System Error: No Event ID found.");
        // Concede auth temporária para o Lead poder acessar as telas de Staff sem travar no login interno
        sessionStorage.setItem('ode_auth', 'true');
        sessionStorage.setItem('sch_auth', 'true');
        window.location.href = `${page}?event=${eventPrefix}`;
    }

    async function resetEvent() {
        const check = prompt(`DANGER ZONE!\nType "DELETE" to completely wipe all records, catalog, and data for event ${eventPrefix}.`);
        if (check === "DELETE") {
            try {
                await _supabase.from('tournament_history').delete().eq('event_id', eventPrefix);
                await _supabase.from('tournament_catalog').delete().eq('event_id', eventPrefix);
                await _supabase.from('ode_registrations').delete().eq('event_id', eventPrefix);
                alert("Event completely wiped. Redirecting to Login.");
                window.location.href = "index.html";
            } catch (err) {
                alert("Error deleting event data: " + err.message);
            }
        }
    }
</script>
</body>
</html>
