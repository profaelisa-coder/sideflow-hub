<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideFlow Hub - LEAD SETUP AREA</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-blue: #1d3557; --sec-blue: #2a4a73; --gold: #ffb703; --blue-act: #457b9d; --red-act: #e63946; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-blue); color: white; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; padding-bottom: 100px; }
        h2 { text-align: center; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin-bottom: 30px; }
        .sector { background: var(--sec-blue); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); margin-bottom: 25px; border-left: 6px solid var(--gold); }
        .sector-title { color: var(--gold); font-weight: bold; text-transform: uppercase; font-size: 0.9rem; margin-bottom: 20px; display: block; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .grid-row { display: grid; gap: 15px; align-items: end; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 0.7rem; font-weight: bold; color: rgba(255,255,255,0.7); margin-bottom: 6px; text-transform: uppercase; }
        input, select { padding: 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; font-size: 0.9rem; }
        button { padding: 12px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; transition: 0.3s; }
        .btn-add { background: var(--gold); color: var(--bg-blue); }
        .btn-blue { background: var(--blue-act); color: white; width: 100%; }
        .btn-red { background: var(--red-act); color: white; width: 100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; }
        td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .btn-del { color: var(--red-act); background: none; border: none; font-size: 11px; cursor: pointer; font-weight: bold; }
        .footer-reset { position: fixed; bottom: 20px; right: 20px; opacity: 0.8; }
    </style>
</head>
<body>
<div class="container">
    <h2>LEAD SETUP AREA</h2>
    <div class="sector">
        <span class="sector-title">SECTION 1: EVENT IDENTITY</span>
        <div class="grid-row" style="grid-template-columns: 2fr 1fr;">
            <div class="input-group"><label>Event Name</label><input type="text" id="masterEvent" onchange="updateIdentity()"></div>
            <div class="input-group"><label>Logo Type</label><select id="masterLogo" onchange="updateIdentity()"><option value="REGIONAL">REGIONAL</option><option value="IC">IC</option></select></div>
        </div>
    </div>
    <div class="sector">
        <span class="sector-title">SECTION 2: SCHEDULED TOURNAMENT CATALOG</span>
        <div class="grid-row" style="grid-template-columns: 2fr 1fr 1fr;">
            <div class="input-group"><label>Tournament Name</label><input type="text" id="schName"></div>
            <div class="input-group"><label>Day</label><select id="schDay"><option>Day 1</option><option>Day 2</option><option>Day 3</option></select></div>
            <div class="input-group"><label>Hour</label><input type="text" id="schHour" placeholder="9:00 AM"></div>
        </div>
        <div class="grid-row" style="grid-template-columns: 1fr 1fr 1fr 1fr auto; margin-top: 15px;">
            <div class="input-group"><label>Fee ($)</label><input type="number" id="schFee"></div>
            <div class="input-group"><label>Cost ($)</label><input type="number" id="schCost"></div>
            <div class="input-group"><label>Part %</label><input type="number" id="schPart" value="20"></div>
            <div class="input-group"><label>Spread</label><select id="schSpread"><option>2.0</option><option>1.75</option><option>1.5</option></select></div>
            <button class="btn-add" onclick="addItem('SCH')">+ ADD SCH</button>
        </div>
        <table id="schList"><tbody></tbody></table>
    </div>
    <div class="sector">
        <span class="sector-title">SECTION 3: ON-DEMAND CATALOG & TABLES</span>
        <div class="grid-row" style="grid-template-columns: 1fr 2fr auto;">
            <div class="input-group"><label>Category</label><select id="odeGame"><option>TCG</option><option>VGC</option><option>GO</option><option>POCKET</option></select></div>
            <div class="input-group"><label>Tournament Name</label><input type="text" id="odeName" placeholder="Ex: Systherhood"></div>
            <button class="btn-add" onclick="addItem('ODE')">+ ADD ODE</button>
        </div>
        <table id="odeList"><tbody></tbody></table>
        <div class="grid-row" style="grid-template-columns: 2fr 1fr auto; margin-top: 25px;">
            <div class="input-group"><label>Table Allocation</label><input type="text" id="tableName" placeholder="Ex: TCG RAID"></div>
            <div class="input-group"><label>Range</label><input type="text" id="tableRange" placeholder="Ex: 1 TO 4"></div>
            <button class="btn-add" onclick="addItem('TABLE')" style="background: rgba(255,255,255,0.2); color: white;">+ ALLOCATE</button>
        </div>
        <table id="tableRules"><tbody></tbody></table>
    </div>
    <div class="sector" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <button class="btn-blue" onclick="navStaff('ode')">VISIT STAFF ODE AREA</button>
        <button class="btn-blue" onclick="navStaff('sch')">VISIT STAFF SCH AREA</button>
        <button class="btn-red" onclick="alert('Final Report coming soon')">GENERATE FINAL REPORT</button>
        <button class="btn-red" onclick="alert('Exporting...')">EXPORT SHEET</button>
    </div>
    <div class="footer-reset"><button class="btn-red" style="padding: 8px 15px; font-size: 0.7rem;" onclick="resetSystem()">RESET SYSTEM</button></div>
</div>
<script>
    const supabaseUrl = 'https://hocpoastnlcwgedvcyqs.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvY3BvYXN0bmxjd2dlZHZjeXFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODU0MTYsImV4cCI6MjA4OTg2MTQxNn0.1MvvcFsnGW4e0Bj7mzoUKs_3bGM-eHDJTOqsvgKe-pI';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
    const eventPrefix = new URLSearchParams(window.location.search).get('event');
    window.onload = () => { if(!eventPrefix) window.location.href='index.html'; loadAll(); };
    async function updateIdentity() {
        await _supabase.from('tournament_history').upsert({ 
            event_id: eventPrefix, tournament_id: 'IDENTITY_ANCHOR', 
            event_name: document.getElementById('masterEvent').value, logo_type: document.getElementById('masterLogo').value 
        }, { onConflict: 'event_id, tournament_id' });
    }
    async function addItem(type) {
        let payload = { event_id: eventPrefix, item_type: type };
        if(type === 'TABLE') {
            payload.t_names = document.getElementById('tableName').value;
            payload.value = document.getElementById('tableRange').value;
        } else if(type === 'SCH') {
            payload.t_names = document.getElementById('schName').value;
            payload.t_day = document.getElementById('schDay').value;
            payload.t_hour = document.getElementById('schHour').value;
            payload.t_fee = document.getElementById('schFee').value;
            payload.t_cost = document.getElementById('schCost').value;
            payload.part = document.getElementById('schPart').value;
            payload.spread = document.getElementById('schSpread').value;
        } else if(type === 'ODE') {
            payload.game = document.getElementById('odeGame').value;
            payload.t_names = document.getElementById('odeName').value;
        }
        const { error } = await _supabase.from('tournament_catalog').insert([payload]);
        if(!error) {
            document.querySelectorAll('input[type="text"], input[type="number"]').forEach(i => { if(i.id !== 'masterEvent') i.value = ""; });
            loadAll();
        } else { console.error("DEBUG SUPABASE ERROR:", error); alert("Error: " + error.message); }
    }
    async function loadAll() {
        const { data } = await _supabase.from('tournament_catalog').select('*').eq('event_id', eventPrefix);
        document.querySelector('#tableRules tbody').innerHTML = "";
        document.querySelector('#schList tbody').innerHTML = "";
        document.querySelector('#odeList tbody').innerHTML = "";
        if(!data) return;
        data.forEach(item => {
            let row = `<tr>`;
            if(item.item_type === 'TABLE') {
                row += `<td>${item.t_names}</td><td style="color:var(--gold)">${item.value}</td><td style="text-align:right"><button onclick="del('${item.id}')" class="btn-del">REMOVE</button></td></tr>`;
                document.querySelector('#tableRules tbody').innerHTML += row;
            } else if(item.item_type === 'SCH') {
                row += `<td><strong>${item.t_names}</strong></td><td>${item.t_day} | ${item.t_hour}</td><td style="color:var(--gold)">$${item.t_fee}</td><td style="text-align:right"><button onclick="del('${item.id}')" class="btn-del">REMOVE</button></td></tr>`;
                document.querySelector('#schList tbody').innerHTML += row;
            } else if(item.item_type === 'ODE') {
                row += `<td style="width:20%; color:var(--gold)"><strong>${item.game}</strong></td><td>${item.t_names}</td><td style="text-align:right"><button onclick="del('${item.id}')" class="btn-del">REMOVE</button></td></tr>`;
                document.querySelector('#odeList tbody').innerHTML += row;
            }
        });
    }
    async function del(id) { if(confirm("Confirm removal?")) { await _supabase.from('tournament_catalog').delete().eq('id', id); loadAll(); } }
    function navStaff(target) { window.location.href = `admin_${target}.html?event=${eventPrefix}`; }
    async function resetSystem() { if(confirm("RESET ALL?")) { await _supabase.from('tournament_catalog').delete().eq('event_id', eventPrefix); loadAll(); } }
</script>
</body>
</html>
