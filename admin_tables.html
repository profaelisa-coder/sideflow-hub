<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideFlow - Table Map</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #1A4B84; --sec: #2B6CB0; --gold: #ffb703; --white: #e0e1dd; --red: #e63946; --dark: #0A2540; --blue: #63B3ED; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 1000px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h2 { color: var(--gold); margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        
        .btn-back { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-back:hover { background: var(--gold); color: var(--dark); }

        /* Grade de Mesas */
        .table-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; width: 100%; }
        
        .table-card { 
            background: var(--dark); border-radius: 8px; padding: 15px; text-align: center; 
            border-bottom: 4px solid #555; transition: 0.3s; position: relative;
        }
        
        /* Cores de Status */
        .table-card.FREE { border-bottom-color: #2ecc71; }
        .table-card.OCCUPIED { border-bottom-color: var(--red); background: #2d1a1a; }
        
        .table-num { font-size: 1.5rem; font-weight: bold; display: block; margin-bottom: 5px; }
        .table-status { font-size: 0.65rem; text-transform: uppercase; font-weight: bold; opacity: 0.8; }
        .table-tour { font-size: 0.7rem; color: var(--blue); margin-top: 5px; font-weight: bold; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .legend { display: flex; gap: 20px; margin-bottom: 20px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; font-size: 0.8rem; }
        .leg-item { display: flex; align-items: center; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 2px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>TABLE INFRASTRUCTURE MAP</h2>
        <button class="btn-back" onclick="history.back()">RETURN</button>
    </div>

    <div class="legend">
        <div class="leg-item"><div class="dot" style="background: #2ecc71;"></div> FREE</div>
        <div class="leg-item"><div class="dot" style="background: var(--red);"></div> OCCUPIED (SCH/ODE)</div>
    </div>

    <div id="tableGrid" class="table-grid">
        </div>
</div>

<script>
    const supabaseUrl = 'https://hocpoastnlcwgedvcyqs.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvY3BvYXN0bmxjd2dlZHZjeXFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODU0MTYsImV4cCI6MjA4OTg2MTQxNn0.1MvvcFsnGW4e0Bj7mzoUKs_3bGM-eHDJTOqsvgKe-pI';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
    const urlParams = new URLSearchParams(window.location.search);
    const eventPrefix = urlParams.get('event');

    window.onload = () => {
        if(!eventPrefix) return alert("NO EVENT PREFIX FOUND");
        loadTables();
        
        // Ativa o Realtime para monitorar mudanças nas mesas
        _supabase.channel('table_updates')
            .on('postgres_changes', { 
                event: '*', 
                schema: 'public', 
                table: 'event_tables',
                filter: `event_id=eq.${eventPrefix}` 
            }, () => {
                loadTables();
            })
            .subscribe();
    };

    async function loadTables() {
        const { data: tables, error } = await _supabase
            .from('event_tables')
            .select('*')
            .eq('event_id', eventPrefix)
            .order('table_number', { ascending: true });

        if(error) return console.error("Error loading tables:", error);
        renderTables(tables);
    }

    function renderTables(tables) {
        const grid = document.getElementById('tableGrid');
        grid.innerHTML = "";
        
        tables.forEach(t => {
            const statusClass = t.status.toUpperCase();
            const tourName = t.tournament_name || "";
            
            grid.innerHTML += `
                <div class="table-card ${statusClass}">
                    <span class="table-num">${t.table_number}</span>
                    <span class="table-status">${statusClass}</span>
                    <span class="table-tour">${tourName}</span>
                </div>
            `;
        });
    }

</script>
</body>
</html>
