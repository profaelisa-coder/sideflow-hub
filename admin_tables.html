<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideFlow - Table Map</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #1A4B84; --sec: #2B6CB0; --gold: #ffb703; --blue: #63B3ED; --red: #e63946; --green: #2ecc71; --white: #e0e1dd; --dark: #0A2540; --blocked: #666666; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        
        /* CABEÇALHO */
        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        h2 { color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin: 0; }
        .btn-top-back { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 8px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; font-size: 0.8rem; }
        .btn-top-back:hover { background: var(--gold); color: var(--dark); }
        
        .layout { display: flex; gap: 20px; flex: 1; overflow: hidden; }
        .sidebar { width: 300px; background: var(--sec); border-radius: 12px; padding: 15px; display: flex; flex-direction: column; border-top: 4px solid var(--gold); }
        .sidebar h3 { margin-top: 0; color: var(--gold); font-size: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        
        .pod-card { background: var(--bg); padding: 15px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--green); }
        .pod-card h4 { margin: 0 0 5px 0; color: white; }
        
        .btn-alloc { width: 100%; background: var(--gold); color: var(--dark); border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-wa { width: 100%; background: var(--green); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 10px; display: none; }
        
        /* BOTOES NOVOS PARA MASS ACTION */
        .btn-red { width: 100%; background: var(--red); color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-red:hover { filter: brightness(1.2); }
        
        /* MODAL DE MASS FREE */
        .modal { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-content { background: var(--sec); padding: 30px; border-radius: 12px; border-top: 4px solid var(--red); width: 90%; max-width: 400px; text-align: center; }
        .modal-content select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: var(--dark); color: white; margin-bottom: 20px; font-size: 1rem; }

        .map-area { flex: 1; background: var(--sec); border-radius: 12px; padding: 20px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.1); }
        .grid-tables { display: grid; grid-template-columns: repeat(auto-fill, minmax(65px, 1fr)); gap: 12px; }
        
        .table-box { aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.3); flex-direction: column; background: var(--dark); border: 1px solid var(--blue); position: relative; }
        .table-box span { font-size: 0.55rem; margin-top: 4px; opacity: 0.8; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 90%; }
        
        .free-state { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.2); }
        .occupied-state { background: var(--red); color: white; border: 2px solid #a30000; }
        .blocked-state { background: var(--blocked); color: white; border: 2px solid #333333; cursor: not-allowed; }
        
        .btn-block-table { position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,0.5); color: white; border: none; font-size: 0.5rem; cursor: pointer; border-radius: 4px; padding: 2px 4px; }
        .btn-block-table:hover { background: var(--red); }
    </style>
</head>
<body>

<div id="massFreeModal" class="modal">
    <div class="modal-content">
        <h3 style="color: var(--gold); margin-top: 0; border-bottom: none; padding-bottom: 0;">MASS FREE TABLES</h3>
        <p style="font-size: 0.85rem; margin-bottom: 20px; opacity: 0.8;">Select the tournament you want to close and clear from the map.</p>
        
        <select id="massFreeSelect">
            <option value="">-- LOADING EVENTS --</option>
        </select>
        
        <div style="display: flex; gap: 10px;">
            <button class="btn-red" style="margin:0; flex:1;" onclick="confirmMassFree()">CONFIRM FREE</button>
            <button style="background: #666; color: white; border: none; border-radius: 6px; font-weight: bold; margin:0; flex:1; cursor: pointer;" onclick="closeMassFreeModal()">CANCEL</button>
        </div>
    </div>
</div>

<div class="header-top">
    <h2>TOURNAMENT TABLE MAP</h2>
    <button class="btn-top-back" onclick="window.history.back()">BACK</button>
</div>

<div class="layout">
    <div class="sidebar">
        <h3>READY TO ALLOCATE</h3>
        <div id="readyPodsList" style="flex: 1; overflow-y: auto;"></div>
        
        <div style="margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px;">
            <button class="btn-red" onclick="openMassFreeModal()">MASS FREE TABLES</button>
        </div>
    </div>
    <div class="map-area">
        <div class="grid-tables" id="tablesGrid"></div>
    </div>
</div>

<script>
    const supabaseUrl = 'https://hocpoastnlcwgedvcyqs.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvY3BvYXN0bmxjd2dlZHZjeXFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODU0MTYsImV4cCI6MjA4OTg2MTQxNn0.1MvvcFsnGW4e0Bj7mzoUKs_3bGM-eHDJTOqsvgKe-pI';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
    const urlParams = new URLSearchParams(window.location.search);
    let eventPrefix = urlParams.get('event') || localStorage.getItem('active_event_id');
    let allTables = [];
    let catalogSizes = {}; 
    let pendingWA = {};
    let subscription = null;

    window.onload = async () => {
        if(!eventPrefix) return;
        await loadCatalog();
        await loadTables();
        await loadReadyPods();
        
        setupRealtime();
        
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                loadTables();
                loadReadyPods();
                setupRealtime();
            }
        });
    };

    function setupRealtime() {
        if (subscription) {
            _supabase.removeChannel(subscription);
        }
        subscription = _supabase.channel('custom-all-channel')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'ode_registrations', filter: `event_id=eq.${eventPrefix}` }, loadReadyPods)
            .on('postgres_changes', { event: '*', schema: 'public', table: 'event_tables', filter: `event_id=eq.${eventPrefix}` }, loadTables)
            .subscribe();
    }

    async function loadCatalog() {
        const { data } = await _supabase.from('tournament_catalog').select('tname, pod_size, table_min, table_max').eq('event_id', eventPrefix);
        if(data) data.forEach(t => catalogSizes[t.tname] = { size: parseInt(t.pod_size), min: t.table_min, max: t.table_max });
    }

    async function loadTables() {
        const { data } = await _supabase.from('event_tables').select('*').eq('event_id', eventPrefix).order('table_number', { ascending: true });
        allTables = data || [];
        const grid = document.getElementById('tablesGrid');
        grid.innerHTML = "";
        
        allTables.forEach(t => {
            const upperStatus = t.status ? t.status.trim().toUpperCase() : '';
            let stateClass = 'free-state';
            let statusText = 'FREE';
            
            if (upperStatus === 'OCCUPIED') {
                stateClass = 'occupied-state';
                statusText = t.tournament_name || 'OCCUPIED';
            } else if (upperStatus === 'BLOCKED') {
                stateClass = 'blocked-state';
                statusText = 'BLOCKED';
            }

            const isFree = upperStatus === 'FREE';
            
            let blockBtn = '';
            if (isFree) {
                blockBtn = `<button class="btn-block-table" onclick="event.stopPropagation(); toggleBlockTable('${t.id}', 'BLOCK')">X</button>`;
            } else if (upperStatus === 'BLOCKED') {
                 blockBtn = `<button class="btn-block-table" onclick="event.stopPropagation(); toggleBlockTable('${t.id}', 'FREE')">O</button>`;
            }

            grid.innerHTML += `<div class="table-box ${stateClass}" onclick="clearTable('${t.id}', '${upperStatus}', ${t.table_number})">
                ${blockBtn}
                ${t.table_number}<span>${statusText}</span>
            </div>`;
        });
    }

    async function loadReadyPods() {
        const { data: regs } = await _supabase.from('ode_registrations').select('*').eq('event_id', eventPrefix).eq('status', 'waiting');
        const listDiv = document.getElementById('readyPodsList');
        if(!regs || regs.length === 0) { listDiv.innerHTML = "<p style='opacity:0.5; font-size:0.8rem; text-align:center;'>No pods ready.</p>"; return; }
        const groups = {};
        regs.forEach(r => { 
            const key = `${r.tname}|${r.pod_number}`;
            if(!groups[key]) groups[key] = { tname: r.tname, pod_number: r.pod_number, players: [] };
            groups[key].players.push({id: r.id, phone: r.player_phone});
        });
        listDiv.innerHTML = "";
        for (const [key, info] of Object.entries(groups)) {
            const targetSize = catalogSizes[info.tname] ? catalogSizes[info.tname].size : 4; 
            if(info.players.length >= targetSize) {
                const safeKey = key.replace(/[^a-zA-Z0-9]/g, '');
                const isPending = pendingWA[key];
                listDiv.innerHTML += `
                    <div class="pod-card">
                        <h4>${info.tname} #${info.pod_number}</h4>
                        <button class="btn-alloc" id="alloc-${safeKey}" style="display:${isPending?'none':'block'}" onclick="allocate('${info.tname}', '${safeKey}', '${key}')">ALLOCATE</button>
                        <button class="btn-wa" id="wa-${safeKey}" style="display:${isPending?'block':'none'}" onclick="sendBulkWA('${key}', '${safeKey}')">SEND WHATSAPP</button>
                    </div>`;
            }
        }
    }

    async function allocate(tname, safeKey, groupKey) {
        const minT = catalogSizes[tname] ? parseInt(catalogSizes[tname].min) || 1 : 1;
        const maxT = catalogSizes[tname] ? parseInt(catalogSizes[tname].max) || 9999 : 9999;
        
        const { data: tableData, error } = await _supabase.rpc('assign_table_smart', { target_event_id: eventPrefix, min_t: minT, max_t: maxT });
        
        if (error || !tableData || tableData.length === 0) {
            console.error(error);
            return alert("NO FREE TABLES IN THIS SECTION!");
        }
        
        const tableNum = tableData[0].table_number;
        await _supabase.from('event_tables').update({ tournament_name: tname, status: 'OCCUPIED' }).eq('event_id', eventPrefix).eq('table_number', tableNum);
        pendingWA[groupKey] = { table: tableNum };
        document.getElementById(`alloc-${safeKey}`).style.display = 'none';
        document.getElementById(`wa-${safeKey}`).style.display = 'block';
        loadTables();
    }

    async function sendBulkWA(groupKey, safeKey) {
        const info = pendingWA[groupKey];
        const [tname, podNum] = groupKey.split('|');
        
        const { data: players } = await _supabase
            .from('ode_registrations')
            .select('id, player_name, player_phone')
            .eq('event_id', eventPrefix)
            .eq('tname', tname)
            .eq('pod_number', podNum)
            .eq('status', 'waiting');

        if(players && players.length > 0) {
            for (const p of players) {
                if(p.player_phone) {
                    const msg = encodeURIComponent(`SIDEFLOW: Your Pod ${tname} #${podNum} is READY! Please proceed to Table ${info.table}.`);
                    if(confirm(`Send WhatsApp to ${p.player_name} (${p.player_phone})?`)) {
                        window.open(`https://wa.me/${p.player_phone}?text=${msg}`, '_blank');
                    }
                }
            }

            await _supabase.from('ode_registrations')
                .update({ status: 'allocated', assigned_table: info.table })
                .in('id', players.map(p => p.id));
        }

        delete pendingWA[groupKey];
        loadReadyPods();
    }

    async function clearTable(id, status, num) {
        const safeStatus = status ? status.trim().toUpperCase() : '';
        if(safeStatus === 'FREE' || safeStatus === 'BLOCKED') return; 
        if(confirm(`Free Table ${num}?`)) {
            await _supabase.from('event_tables').update({ status: 'FREE', tournament_name: null }).eq('id', id);
            loadTables();
        }
    }

    async function toggleBlockTable(id, action) {
        const newStatus = action === 'BLOCK' ? 'BLOCKED' : 'FREE';
        await _supabase.from('event_tables').update({ status: newStatus, tournament_name: null }).eq('id', id);
        loadTables();
    }

    /* === FUNÇÕES NOVAS DE MASS FREE === */
    function openMassFreeModal() {
        const occupiedTables = allTables.filter(t => (t.status || '').trim().toUpperCase() === 'OCCUPIED' && t.tournament_name);
        const uniqueTournaments = [...new Set(occupiedTables.map(t => t.tournament_name))];
        
        const select = document.getElementById('massFreeSelect');
        select.innerHTML = '<option value="">-- SELECT EVENT --</option>';
        
        uniqueTournaments.forEach(name => {
            const count = occupiedTables.filter(t => t.tournament_name === name).length;
            select.innerHTML += `<option value="${name}">${name} (${count} tables in use)</option>`;
        });
        
        document.getElementById('massFreeModal').style.display = 'flex';
    }

    function closeMassFreeModal() {
        document.getElementById('massFreeModal').style.display = 'none';
        document.getElementById('massFreeSelect').value = "";
    }

    async function confirmMassFree() {
        const tname = document.getElementById('massFreeSelect').value;
        if(!tname) return alert("Please select a tournament first.");
        
        const count = allTables.filter(t => t.tournament_name === tname && (t.status || '').trim().toUpperCase() === 'OCCUPIED').length;
        
        const isConfirmed = confirm(`⚠️ DANGER ZONE ⚠️\n\nYou are about to free ${count} tables assigned to "${tname}".\n\nThis action will immediately change all these tables to FREE on the map.\n\nAre you ABSOLUTELY sure?`);
        
        if(isConfirmed) {
            const { error } = await _supabase
                .from('event_tables')
                .update({ status: 'FREE', tournament_name: null })
                .eq('event_id', eventPrefix)
                .eq('tournament_name', tname);
                
            if(error) {
                alert("Error freeing tables: " + error.message);
            } else {
                alert(`${count} tables successfully freed!`);
                closeMassFreeModal();
                loadTables();
            }
        }
    }
</script>
</body>
</html>
