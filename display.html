<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideFlow Hub - HYPE DISPLAY</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0A2540; --sec: #1A4B84; --gold: #ffb703; --blue: #63B3ED; --white: #e0e1dd; --red: #e63946; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        .main-layout { display: flex; flex: 1; overflow: hidden; position: relative; }
        .hype-container { width: 100%; display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; padding: 30px; padding-bottom: 120px; align-content: start; overflow-y: auto; scroll-behavior: auto; -ms-overflow-style: none; scrollbar-width: none; }
        .hype-container::-webkit-scrollbar { display: none; }
        
        .footer-calls { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--bg); border-top: 3px solid var(--gold); display: flex; align-items: center; padding: 15px 30px; box-sizing: border-box; gap: 20px; z-index: 100; box-shadow: 0 -5px 20px rgba(0,0,0,0.5); }
        .footer-title { color: var(--gold); font-weight: 900; font-size: 1.5rem; text-transform: uppercase; white-space: nowrap; letter-spacing: 2px; }
        .footer-calls-list { display: flex; gap: 15px; flex: 1; overflow: hidden; justify-content: flex-start; }
        .footer-call { background: var(--sec); padding: 10px 25px; border-radius: 8px; border-left: 5px solid var(--blue); font-size: 1.2rem; font-weight: bold; white-space: nowrap; display: flex; align-items: center; gap: 10px; color: white; }
        .footer-call span { color: var(--gold); font-size: 1.4rem; }
        .footer-call.new-call { border-left-color: var(--gold); animation: pulse-new 2s infinite; }
        
        @keyframes pulse-new { 0% { box-shadow: 0 0 0px var(--gold); } 50% { box-shadow: 0 0 15px var(--gold); } 100% { box-shadow: 0 0 0px var(--gold); } }
        
        .pod-card { background: linear-gradient(145deg, var(--sec), #0c2b4d); border-radius: 15px; padding: 25px; border: 2px solid rgba(255,255,255,0.05); }
        .pod-category { font-size: 0.9rem; color: var(--gold); font-weight: bold; text-transform: uppercase; }
        .pod-name { font-size: 1.8rem; margin: 10px 0; font-weight: 800; color: white; display: flex; justify-content: space-between; align-items: center; }
        .pod-name small { font-size: 1.1rem; opacity: 0.7; color: var(--blue); }
        .progress-container { background: rgba(0,0,0,0.3); height: 40px; border-radius: 20px; margin-top: 20px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.1); }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #b08d00, var(--gold), #ffda6a); width: 0%; transition: width 0.5s ease-in-out; }
        .pod-status { position: absolute; width: 100%; text-align: center; top: 50%; transform: translateY(-50%); font-weight: 900; font-size: 1.2rem; text-shadow: 1px 1px 3px rgba(0,0,0,0.9); }
        
        .pulse-gold { animation: border-pulse 1.5s infinite; }
        @keyframes border-pulse { 0% { border-color: rgba(255,183,3,0.2); } 50% { border-color: rgba(255,183,3,1); box-shadow: 0 0 20px rgba(255,183,3,0.6); } 100% { border-color: rgba(255,183,3,0.2); } }
    </style>
</head>
<body>

<div class="main-layout">
    <div class="hype-container" id="displayArea"></div>
    
    <div class="footer-calls">
        <div class="footer-title">LAST PODS STARTED ➔</div>
        <div class="footer-calls-list" id="callsArea">
            <p style="opacity:0.5; font-style: italic; margin:0;">Waiting for first assignments...</p>
        </div>
    </div>
</div>

<script>
    const supabaseUrl = 'https://hocpoastnlcwgedvcyqs.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvY3BvYXN0bmxjd2dlZHZjeXFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODU0MTYsImV4cCI6MjA4OTg2MTQxNn0.1MvvcFsnGW4e0Bj7mzoUKs_3bGM-eHDJTOqsvgKe-pI';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
    
    let eventPrefix = new URLSearchParams(window.location.search).get('event') || localStorage.getItem('active_event_id');
    let scrollSpeed = 0.5;
    let scrollDirection = 1;
    let isPaused = false;

    async function initDisplay() {
        const displayArea = document.getElementById('displayArea');
        if(!eventPrefix) {
            displayArea.innerHTML = "<h2 style='color:red; width:100%; text-align:center;'>ERRO: EVENT ID MISSING. ADD ?event=ID</h2>";
            return;
        }

        updateDisplay();
        updateCalls();
        
        setInterval(() => {
            updateDisplay();
            updateCalls();
        }, 10000);

        _supabase.channel('public:ode_registrations_tv')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'ode_registrations' }, () => {
                updateDisplay();
                updateCalls();
            })
            .subscribe();

        requestAnimationFrame(autoScroll);
    }

    function autoScroll() {
        const container = document.getElementById('displayArea');
        if (!container || isPaused) {
            requestAnimationFrame(autoScroll);
            return;
        }
        if (container.scrollHeight <= container.clientHeight) {
            requestAnimationFrame(autoScroll);
            return;
        }
        
        container.scrollTop += scrollSpeed * scrollDirection;

        if (scrollDirection === 1 && container.scrollTop + container.clientHeight >= container.scrollHeight - 1) {
            scrollDirection = -1;
            isPaused = true;
            setTimeout(() => { isPaused = false; requestAnimationFrame(autoScroll); }, 3000);
            return;
        } else if (scrollDirection === -1 && container.scrollTop <= 0) {
            scrollDirection = 1;
            isPaused = true;
            setTimeout(() => { isPaused = false; requestAnimationFrame(autoScroll); }, 3000);
            return;
        }
        requestAnimationFrame(autoScroll);
    }

    async function updateDisplay() {
        const displayArea = document.getElementById('displayArea');
        const { data: tours, error: errTours } = await _supabase.from('tournament_catalog').select('*').eq('event_id', eventPrefix).eq('item_type', 'ODE').order('id', { ascending: true });
        
        if(errTours) return;
        if(!tours || tours.length === 0) return;

        const { data: regs } = await _supabase.from('ode_registrations').select('*').eq('event_id', eventPrefix).in('status', ['waiting', 'allocated']);

        tours.forEach((t, index) => {
            const relevantRegs = regs ? regs.filter(r => r.tname === t.tname) : [];
            let maxPod = relevantRegs.length > 0 ? Math.max(...relevantRegs.map(r => r.pod_number)) : 1;
            let currentPodPlayers = relevantRegs.filter(r => r.pod_number === maxPod);
            let count = currentPodPlayers.length;
            const target = t.pod_size || 4;

            const isAllocated = count > 0 && currentPodPlayers.every(p => p.status === 'allocated');
            if (isAllocated) {
                maxPod++; 
                count = 0; 
            }

            const percentage = Math.min((count / target) * 100, 100);
            const cardId = `pod-${t.id}`;
            let card = document.getElementById(cardId);

            if (!card) {
                card = document.createElement('div');
                card.id = cardId;
                card.style.order = index;
                displayArea.appendChild(card);
            }

            card.className = `pod-card ${count === (target - 1) ? 'pulse-gold' : ''}`;
            card.innerHTML = `
                <div class="pod-category">[${t.game}]</div>
                <div class="pod-name">${t.tname} <small>POD #${maxPod}</small></div>
                <div class="progress-container">
                    <div class="progress-bar" style="width: ${percentage}%"></div>
                    <div class="pod-status">${count} / ${target}</div>
                </div>
            `;
        });
    }

    async function updateCalls() {
        const { data: calls } = await _supabase.from('ode_registrations')
            .select('tname, pod_number, assigned_table, created_at')
            .eq('event_id', eventPrefix)
            .eq('status', 'allocated')
            .order('created_at', { ascending: false });

        const callsArea = document.getElementById('callsArea');

        if(!calls || calls.length === 0) {
            callsArea.innerHTML = "<p style='opacity:0.5; font-style: italic; margin:0;'>Waiting for first assignments...</p>";
            return;
        }

        const uniqueCalls = [];
        const seen = new Set();
        for (const c of calls) {
            const id = `${c.tname}-${c.pod_number}`;
            if (!seen.has(id)) {
                uniqueCalls.push(c);
                seen.add(id);
            }
            if (uniqueCalls.length >= 4) break; 
        }

        callsArea.innerHTML = "";
        uniqueCalls.forEach((c, index) => {
            const item = document.createElement('div');
            item.className = `footer-call ${index === 0 ? 'new-call' : ''}`;
            item.innerHTML = `${c.tname} #${c.pod_number} &nbsp;➔&nbsp; <span>TABLE ${c.assigned_table}</span>`;
            callsArea.appendChild(item);
        });
    }

    initDisplay();
</script>
</body>
</html>
