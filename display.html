<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideFlow Hub - DISPLAY</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0A2540; --sec: #1A4B84; --gold: #ffb703; --blue: #63B3ED; --white: #e0e1dd; --red: #e63946; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        .main-layout { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        
        #scrollWrapper { flex: 1; overflow: hidden; position: relative; }
        .hype-container { width: 100%; display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; padding: 30px; position: absolute; top: 0; left: 0; will-change: transform; }
        
        .pod-card { background: linear-gradient(145deg, var(--sec), #0c2b4d); border-radius: 15px; padding: 20px; border: 2px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; justify-content: space-between; height: 160px; box-sizing: border-box; }
        .pod-category { font-size: 0.8rem; color: var(--blue); font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .pod-name { font-size: 1.3rem; font-weight: 800; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }
        .pod-number { font-size: 2.2rem; font-weight: 900; color: var(--white); margin: 5px 0; line-height: 1; }
        
        .progress-container { background: rgba(0,0,0,0.3); height: 35px; border-radius: 10px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.1); }
        .progress-bar { height: 100%; background: var(--gold); width: 0%; transition: width 0.5s ease-in-out; }
        .pod-status { position: absolute; width: 100%; text-align: center; top: 50%; transform: translateY(-50%); font-weight: 900; font-size: 1.1rem; text-shadow: 1px 1px 3px rgba(0,0,0,0.9); color: white; }

        .divider-fixed { background: var(--bg); border-top: 3px solid var(--gold); padding: 10px 0; text-align: center; z-index: 100; box-shadow: 0 -10px 20px rgba(0,0,0,0.5); }
        .divider-title { color: var(--gold); font-weight: 900; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 4px; }

        .footer-calls { height: 70px; background: #051525; display: flex; align-items: center; overflow: hidden; position: relative; }
        .marquee-content { display: flex; white-space: nowrap; will-change: transform; }
        .footer-call { display: inline-flex; align-items: center; padding: 0 40px; font-size: 1.3rem; font-weight: bold; color: white; }
        .footer-call span { color: var(--gold); margin-left: 15px; font-size: 1.5rem; }

        .pulse-gold { animation: border-pulse 1.5s infinite; }
        @keyframes border-pulse { 0% { border-color: rgba(255,183,3,0.2); } 50% { border-color: rgba(255,183,3,1); box-shadow: 0 0 20px rgba(255,183,3,0.6); } 100% { border-color: rgba(255,183,3,0.2); } }
    </style>
</head>
<body>

<div class="main-layout">
    <div id="scrollWrapper">
        <div class="hype-container" id="displayArea"></div>
        <div class="hype-container" id="displayAreaClone" style="top: 100%"></div>
    </div>
    
    <div class="divider-fixed">
        <div class="divider-title">LAST PODS STARTED</div>
    </div>

    <div class="footer-calls">
        <div class="marquee-content" id="callsMarquee">
            <div class="footer-call">WAITING FOR ASSIGNMENTS...</div>
        </div>
    </div>
</div>

<script>
    const supabaseUrl = 'https://hocpoastnlcwgedvcyqs.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvY3BvYXN0bmxjd2dlZHZjeXFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODU0MTYsImV4cCI6MjA4OTg2MTQxNn0.1MvvcFsnGW4e0Bj7mzoUKs_3bGM-eHDJTOqsvgKe-pI';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
    
    let eventPrefix = new URLSearchParams(window.location.search).get('event') || localStorage.getItem('active_event_id');
    
    let scrollPos = 0;
    let marqueePos = 0;
    const scrollSpeed = 0.4;
    const marqueeSpeed = 0.8;

    async function initDisplay() {
        if(!eventPrefix) return;
        
        await updateData();
        
        _supabase.channel('tv_realtime')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'ode_registrations' }, handleRealtime)
            .subscribe();

        requestAnimationFrame(renderLoop);
    }

    async function updateData() {
        const { data: tours } = await _supabase.from('tournament_catalog').select('*').eq('event_id', eventPrefix).eq('item_type', 'ODE').order('id', { ascending: true });
        const { data: regs } = await _supabase.from('ode_registrations').select('*').eq('event_id', eventPrefix).in('status', ['waiting', 'allocated']);
        
        if(!tours) return;

        const html = tours.map(t => {
            const relevantRegs = regs ? regs.filter(r => r.tname === t.tname) : [];
            let maxPod = relevantRegs.length > 0 ? Math.max(...relevantRegs.map(r => r.pod_number)) : 1;
            let currentPodPlayers = relevantRegs.filter(r => r.pod_number === maxPod);
            let count = currentPodPlayers.length;
            const target = t.pod_size || 4;

            if (count > 0 && currentPodPlayers.every(p => p.status === 'allocated')) {
                maxPod++; 
                count = 0; 
            }

            const percentage = Math.min((count / target) * 100, 100);
            
            return `
                <div class="pod-card ${count === (target - 1) ? 'pulse-gold' : ''}" data-tname="${t.tname}" data-target="${target}">
                    <div class="pod-category">[${t.game}]</div>
                    <div class="pod-name">${t.tname}</div>
                    <div class="pod-number">POD #${maxPod}</div>
                    <div class="progress-container">
                        <div class="progress-bar" style="width: ${percentage}%"></div>
                        <div class="pod-status">${count} / ${target}</div>
                    </div>
                </div>
            `;
        }).join('');

        document.getElementById('displayArea').innerHTML = html;
        document.getElementById('displayAreaClone').innerHTML = html;
        updateMarquee(regs);
    }

    function handleRealtime(payload) {
        const r = payload.new;
        if (r.status === 'allocated') {
            updateData();
            return;
        }

        const cards = document.querySelectorAll(`.pod-card[data-tname="${r.tname}"]`);
        cards.forEach(card => {
            const statusEl = card.querySelector('.pod-status');
            const barEl = card.querySelector('.progress-bar');
            const target = parseInt(card.dataset.target);
            
            let [current, total] = statusEl.innerText.split(' / ');
            let newCount = parseInt(current) + 1;
            
            if (newCount <= target) {
                statusEl.innerText = `${newCount} / ${target}`;
                barEl.style.width = `${(newCount / target) * 100}%`;
                if(newCount === target - 1) card.classList.add('pulse-gold');
            }
        });
        
        const clones = document.getElementById('displayAreaClone').querySelectorAll(`.pod-card[data-tname="${r.tname}"]`);
        clones.forEach((c, i) => c.innerHTML = cards[i].innerHTML);
    }

    async function updateMarquee(regs) {
        const allocated = regs.filter(r => r.status === 'allocated').sort((a,b) => b.id - a.id);
        const marquee = document.getElementById('callsMarquee');
        
        const unique = [];
        const seen = new Set();
        for (const r of allocated) {
            const key = `${r.tname}-${r.pod_number}`;
            if (!seen.has(key)) {
                unique.push(r);
                seen.add(key);
            }
            if (unique.length >= 10) break;
        }

        if(unique.length === 0) return;

        const html = unique.map(r => `
            <div class="footer-call">[${r.tname.substring(0,10)}] POD #${r.pod_number} ➔ <span>TABLE ${r.assigned_table}</span></div>
        `).join('');
        
        marquee.innerHTML = html + html;
    }

    function renderLoop() {
        const container = document.getElementById('displayArea');
        const clone = document.getElementById('displayAreaClone');
        const marquee = document.getElementById('callsMarquee');
        const h = container.offsetHeight + 20;

        scrollPos -= scrollSpeed;
        if (Math.abs(scrollPos) >= h) scrollPos = 0;
        
        container.style.transform = `translateY(${scrollPos}px)`;
        clone.style.transform = `translateY(${scrollPos}px)`;
        clone.style.top = `${h}px`;

        marqueePos -= marqueeSpeed;
        if (Math.abs(marqueePos) >= marquee.scrollWidth / 2) marqueePos = 0;
        marquee.style.transform = `translateX(${marqueePos}px)`;

        requestAnimationFrame(renderLoop);
    }

    initDisplay();
</script>
</body>
</html>
