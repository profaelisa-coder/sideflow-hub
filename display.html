<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideFlow Hub - DISPLAY</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0A2540; --sec: #1A4B84; --gold: #ffb703; --blue: #63B3ED; --white: #e0e1dd; --red: #e63946; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--white); margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        .main-layout { flex: 1; position: relative; overflow: hidden; display: flex; flex-direction: row; }
        
        #scrollWrapper { flex: 7; overflow: hidden; position: relative; }
        
        .hype-container { width: 100%; display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; padding: 30px; position: absolute; top: 0; left: 0; will-change: transform; box-sizing: border-box; }
        
        .pod-card { background: linear-gradient(145deg, var(--sec), #0c2b4d); border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.05); border-left: 6px solid var(--blue); display: flex; flex-direction: column; justify-content: flex-start; min-height: 130px; box-sizing: border-box; }
        .pod-category-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .pod-category { font-size: 0.9rem; color: var(--gold); font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .pod-name { font-size: 1.6rem; font-weight: 800; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; margin: 0 0 10px 0; }
        .pod-number { font-size: 1rem; font-weight: 600; color: var(--white); opacity: 0.8; margin-bottom: 15px; text-transform: uppercase; }
        .pod-number-top { font-size: 1rem; font-weight: 600; color: var(--gold); margin: 0; text-transform: uppercase; }
        
        .progress-container { background: rgba(0,0,0,0.3); height: 35px; border-radius: 10px; overflow: hidden; position: relative; border: 1px solid rgba(255,255,255,0.1); margin-top: auto; }
        .progress-bar { height: 100%; background: var(--gold); width: 0%; transition: width 0.5s ease-in-out; }
        .pod-status { position: absolute; width: 100%; text-align: center; top: 50%; transform: translateY(-50%); font-weight: 900; font-size: 1.1rem; text-shadow: 1px 1px 3px rgba(0,0,0,0.9); color: white; }

        .sidebar { flex: 2.5; max-width: 380px; background: rgba(0,0,0,0.3); border-left: 3px solid var(--gold); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box; z-index: 10; box-shadow: -5px 0 20px rgba(0,0,0,0.5); }
        
        /* AJUSTES NA SIDEBAR PARA CABER MAIS CARDS */
        .sidebar-title { color: var(--gold); font-weight: 900; font-size: 1.4rem; text-transform: uppercase; text-align: center; margin-bottom: 15px; letter-spacing: 2px; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .sidebar-item { background: var(--sec); padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 6px solid var(--blue); }
        .sidebar-item.new-call { border-left-color: var(--gold); animation: pulse-new 2s infinite; }
        
        .pulse-gold { animation: border-pulse 1.5s infinite; }
        @keyframes border-pulse { 0% { border-color: rgba(255,183,3,0.2); } 50% { border-color: rgba(255,183,3,1); box-shadow: 0 0 20px rgba(255,183,3,0.6); } 100% { border-color: rgba(255,183,3,0.2); } }
        @keyframes pulse-new { 0% { box-shadow: 0 0 0px var(--gold); } 50% { box-shadow: 0 0 15px var(--gold); } 100% { box-shadow: 0 0 0px var(--gold); } }
    </style>
</head>
<body>

<div class="main-layout">
    <div id="scrollWrapper">
        <div class="hype-container" id="displayArea"></div>
        <div class="hype-container" id="displayAreaClone" style="top: 100%"></div>
    </div>
    
    <div class="sidebar">
        <div class="sidebar-title">LAST PODS STARTED</div>
        <div id="callsArea">
            <p style="opacity:0.5; font-style: italic; text-align:center;">WAITING FOR ASSIGNMENTS...</p>
        </div>
    </div>
</div>

<script>
    const supabaseUrl = 'https://hocpoastnlcwgedvcyqs.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhvY3BvYXN0bmxjd2dlZHZjeXFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyODU0MTYsImV4cCI6MjA4OTg2MTQxNn0.1MvvcFsnGW4e0Bj7mzoUKs_3bGM-eHDJTOqsvgKe-pI';
    const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
    
    let eventPrefix = new URLSearchParams(window.location.search).get('event') || localStorage.getItem('active_event_id');
    
    let scrollPos = 0;
    const scrollSpeed = 0.15;

    async function initDisplay() {
        if(!eventPrefix) return;
        
        await updateData();
        
        setInterval(updateData, 10000);

        _supabase.channel('tv_realtime_events')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'ode_registrations' }, () => {
                updateData();
            })
            .subscribe();

        requestAnimationFrame(renderLoop);
    }

    async function updateData() {
        const { data: tours } = await _supabase.from('tournament_catalog').select('*').eq('event_id', eventPrefix).eq('item_type', 'ODE').order('id', { ascending: true });
        const { data: regs } = await _supabase.from('ode_registrations').select('*').eq('event_id', eventPrefix).in('status', ['waiting', 'allocated']);
        
        if(!tours) return;

        const html = tours.map(t => {
            const relevantRegs = regs ? regs.filter(r => r.tname === t.tname) : [];
            let maxPod = relevantRegs.length > 0 ? Math.max(...relevantRegs.map(r => r.pod_number)) : 1;
            let currentPodPlayers = relevantRegs.filter(r => r.pod_number === maxPod);
            let count = currentPodPlayers.length;
            const target = t.pod_size || 4;

            if (count > 0 && currentPodPlayers.every(p => p.status === 'allocated')) {
                maxPod++; 
                count = 0; 
            }

            const percentage = Math.min((count / target) * 100, 100);
            
            return `
                <div class="pod-card ${count === (target - 1) ? 'pulse-gold' : ''}">
                    <div class="pod-category-row">
                        <div class="pod-category">[${t.game}]</div>
                        <div class="pod-number-top">POD #${maxPod}</div>
                    </div>
                    <div class="pod-name">${t.tname}</div>
                    <div class="progress-container">
                        <div class="progress-bar" style="width: ${percentage}%"></div>
                        <div class="pod-status">${count} / ${target} PLAYERS</div>
                    </div>
                </div>
            `;
        }).join('');

        document.getElementById('displayArea').innerHTML = html;
        document.getElementById('displayAreaClone').innerHTML = html;
        updateSidebar(regs, tours);
    }

    function updateSidebar(regs, tours) {
        const allocated = regs.filter(r => r.status === 'allocated');
        const callsArea = document.getElementById('callsArea');
        
        const latestPodsMap = new Map();
        
        for (const r of allocated) {
            const existing = latestPodsMap.get(r.tname);
            if (!existing || r.pod_number > existing.pod_number) {
                latestPodsMap.set(r.tname, r);
            }
        }

        let unique = Array.from(latestPodsMap.values());
        
        unique.sort((a, b) => {
            if (a.created_at && b.created_at) {
                return new Date(b.created_at) - new Date(a.created_at);
            }
            return b.pod_number - a.pod_number;
        });

        const topCalls = unique.slice(0, 6);

        if(topCalls.length === 0) {
            callsArea.innerHTML = "<p style='opacity:0.5; font-style: italic; text-align:center;'>WAITING FOR ASSIGNMENTS...</p>";
            return;
        }

        // FONTES REDUZIDAS AQUI PARA CABER NA SIDEBAR
        const html = topCalls.map((r, index) => {
            const tourInfo = tours.find(t => t.tname === r.tname);
            const game = tourInfo ? tourInfo.game : 'GAME';
            return `
            <div class="sidebar-item ${index === 0 ? 'new-call' : ''}">
                <div style="font-size: 0.85rem; color: var(--gold); margin-bottom: 4px; font-weight: bold; text-transform: uppercase;">[${game}] - ${r.tname}</div>
                <div style="font-size: 1.3rem; font-weight: 900; color: white;">POD #${r.pod_number} <span style="color: var(--gold); font-size: 1.2rem;">➔ TABLE ${r.assigned_table}</span></div>
            </div>
            `;
        }).join('');
        
        callsArea.innerHTML = html;
    }

    function renderLoop() {
        const container = document.getElementById('displayArea');
        const clone = document.getElementById('displayAreaClone');
        const h = container.offsetHeight + 20;

        if (h > document.getElementById('scrollWrapper').offsetHeight) {
            scrollPos -= scrollSpeed;
            if (Math.abs(scrollPos) >= h) scrollPos = 0;
            
            container.style.transform = `translateY(${scrollPos}px)`;
            clone.style.transform = `translateY(${scrollPos}px)`;
            clone.style.top = `${h}px`;
            clone.style.display = 'grid';
        } else {
            scrollPos = 0;
            container.style.transform = `translateY(0px)`;
            clone.style.display = 'none';
        }

        requestAnimationFrame(renderLoop);
    }

    initDisplay();
</script>
</body>
</html>
